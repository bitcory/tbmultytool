name: Release

# v로 시작하는 태그를 푸시하면 (예: v0.1.1) 윈도우+맥을 자동 빌드해
# GitHub Releases 에 올린다. 윈도우는 자동업데이트(latest.yml)까지 발행.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build & publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 맥은 코드 서명 없이 빌드 (서명 자동탐색 끄기). dmg 는 수동 배포용으로 Releases 에 올라감.
          CSC_IDENTITY_AUTO_DISCOVERY: false
