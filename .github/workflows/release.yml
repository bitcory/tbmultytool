name: Release

# v로 시작하는 태그를 푸시하면 (예: v0.1.1) 윈도우+맥을 자동 빌드해
# GitHub Releases 에 올린다. 윈도우는 자동업데이트(latest.yml)까지 발행.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Build & publish
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # 맥은 코드 서명 없이 빌드 (서명 자동탐색 끄기). dmg 는 수동 배포용으로 Releases 에 올라감.
          CSC_IDENTITY_AUTO_DISCOVERY: false

  # 윈도우+맥 빌드가 모두 끝난 뒤, electron-builder 가 만든 draft 릴리즈를 공개로 전환.
  # 이 잡 덕분에 앞으로는 태그 푸시만 하면 수동 공개 단계 없이 자동 배포된다.
  publish:
    needs: release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Publish draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --repo "${GITHUB_REPOSITORY}" --draft=false
