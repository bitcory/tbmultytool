<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>카드뉴스 만들기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<style>
  :root{
    --bg:#0b0c10; --panel:#15171f; --panel2:#1d2029; --line:#2a2e3a;
    --ink:#f4f5f7; --muted:#8c93a6; --accent:#3d5afe;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Pretendard',system-ui,sans-serif;
    background:var(--bg);color:var(--ink);
    height:100vh;overflow:hidden;
  }
  /* ---------- Stage (full width) ---------- */
  .stage{height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
    padding:32px;gap:18px;overflow:auto;transition:padding-right .25s ease}
  /* 드로어가 열리면 카드 영역을 왼쪽으로 밀어 겹치지 않게 */
  body.drawer-open .stage{padding-right:412px}
  /* flex-shrink:0 필수 — 세로 공간이 부족하면 frame 높이만 눌려 정사각형이 깨지고 카드 하단(핸들)이 잘린다.
     calc(100vh - 230px) = 위 패널 등으로 화면이 낮아져도 nav/칩 포함 한 화면에 들어가게 */
  .frame{width:min(72vh,520px,calc(100vw - 120px),calc(100vh - 230px));aspect-ratio:1/1;overflow:hidden;border-radius:18px;cursor:pointer;
    flex-shrink:0;box-shadow:0 30px 80px rgba(0,0,0,.5);transition:transform .15s, width .25s ease}
  body.drawer-open .frame{width:min(72vh,520px,calc(100vw - 500px),calc(100vh - 230px))}
  .frame:hover{transform:translateY(-2px)}
  .scaler{transform-origin:top left}
  .nav{display:flex;align-items:center;gap:14px}
  .nav button{width:42px;height:42px;border-radius:50%;border:1px solid var(--line);
    background:var(--panel);color:var(--ink);font-size:18px;cursor:pointer}
  .nav .pos{font-size:13px;color:var(--muted);font-weight:700;min-width:54px;text-align:center}
  .chips{display:flex;gap:6px;flex-wrap:wrap;justify-content:center;max-width:560px}
  .chip{padding:7px 11px;border-radius:8px;background:var(--panel2);border:1px solid var(--line);
    font-size:12px;font-weight:700;cursor:pointer;color:var(--muted)}
  .chip.active{background:var(--accent);border-color:var(--accent);color:#fff}
  .hint{font-size:12px;color:var(--muted)}

  /* 우상단 편집 버튼 */
  .edit-fab{position:fixed;top:18px;right:18px;z-index:40;padding:10px 16px;border-radius:10px;
    border:none;background:var(--accent);color:#fff;font-family:inherit;font-weight:800;font-size:13px;
    cursor:pointer;box-shadow:0 8px 22px rgba(61,90,254,.4)}

  /* ---------- 우측 편집 드로어(모달) ---------- */
  .backdrop{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:45;opacity:0;pointer-events:none;
    transition:opacity .2s}
  .backdrop.open{opacity:1;pointer-events:auto}
  .drawer{position:fixed;top:0;right:0;width:380px;max-width:90vw;height:100vh;z-index:50;
    background:var(--panel);border-left:1px solid var(--line);overflow-y:auto;padding:22px;
    transform:translateX(100%);transition:transform .25s ease}
  .drawer.open{transform:translateX(0)}
  .drawer-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:6px}
  .drawer-head h1{font-size:17px;font-weight:800;letter-spacing:-.02em}
  .drawer-head .x{width:32px;height:32px;border-radius:8px;border:1px solid var(--line);
    background:var(--panel2);color:var(--ink);font-size:18px;cursor:pointer}
  .group{margin-top:22px}
  .group>label{display:block;font-size:11px;font-weight:800;text-transform:uppercase;
    letter-spacing:.08em;color:var(--muted);margin-bottom:9px}
  input,textarea{
    width:100%;background:var(--panel2);border:1px solid var(--line);
    border-radius:9px;color:var(--ink);padding:10px 12px;
    font-family:inherit;font-size:13.5px;resize:vertical;
  }
  input:focus,textarea:focus{outline:none;border-color:var(--accent)}
  textarea{min-height:70px;line-height:1.5}
  .field{margin-bottom:12px}
  .field span{display:block;font-size:11px;color:var(--muted);margin-bottom:5px}
  .field-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
  .field-head span,.field-head label{margin:0}
  /* 글씨색 버튼 — 기본(미설정)은 체커보드, 색 지정 시 단색 */
  .mini-sw{width:22px;height:22px;border-radius:6px;border:2px solid #545b6b;cursor:pointer;flex-shrink:0;
    background-image:linear-gradient(45deg,#3a3f4a 25%,transparent 25%,transparent 75%,#3a3f4a 75%),
      linear-gradient(45deg,#3a3f4a 25%,#22252e 25%,#22252e 75%,#3a3f4a 75%);
    background-size:8px 8px;background-position:0 0,4px 4px}
  .mini-sw:hover{border-color:#7b8395}
  .swatches{display:flex;gap:8px;flex-wrap:wrap}
  .sw{width:34px;height:34px;border-radius:8px;cursor:pointer;border:2px solid transparent}
  .sw.active{border-color:#fff}
  /* 배경/액센트 색상 칩 */
  .font-row{display:flex;gap:8px}
  .font-row select{flex:1;background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    color:var(--ink);padding:9px 10px;font-family:inherit;font-size:12.5px;cursor:pointer;min-width:0}
  .font-row select:focus{outline:none;border-color:var(--accent)}
  .size-row{display:flex;align-items:center;gap:10px;margin-top:8px}
  .size-row>span:first-child{font-size:12px;color:var(--ink);font-weight:600;white-space:nowrap}
  .size-row input[type=range]{flex:1;accent-color:var(--accent);min-width:0}
  #fontSizeVal{font-size:12px;color:var(--muted);min-width:38px;text-align:right}
  .color-cols{display:flex;gap:10px}
  .color-col{flex:1;display:flex;flex-direction:column;gap:6px}
  .color-col>span{font-size:12px;color:var(--ink);font-weight:600}
  .color-chip{width:100%;height:34px;border-radius:8px;border:2px solid #545b6b;cursor:pointer}
  .color-chip:hover{border-color:#7b8395}
  /* 색상 피커 모달 */
  .cp-ov{position:fixed;inset:0;z-index:60;display:none;align-items:center;justify-content:center;
    background:rgba(0,0,0,.45)}
  .cp-ov.open{display:flex}
  .cp{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:16px;width:330px;
    box-shadow:0 24px 60px rgba(0,0,0,.55)}
  .cp-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
  .cp-head b{font-size:15px;font-weight:800}
  .cp-head button{background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer}
  .cp-sub{font-size:11px;color:var(--muted);margin-bottom:8px;font-weight:700}
  .cp-grid{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;margin-bottom:14px}
  .cp-grid .c{width:100%;aspect-ratio:1/1;border-radius:6px;cursor:pointer;
    border:1px solid rgba(255,255,255,.08);transition:transform .1s}
  .cp-grid .c:hover{transform:scale(1.12)}
  .cp-foot{display:flex;align-items:center;gap:8px}
  .cp-prev{width:34px;height:34px;border-radius:8px;border:1px solid var(--line);flex-shrink:0}
  .cp-foot input{flex:1}
  .cp-eye{width:36px;height:36px;border-radius:8px;border:1px solid var(--line);background:var(--panel2);
    color:var(--ink);cursor:pointer;flex-shrink:0;font-size:16px}
  .btn{display:block;width:100%;text-align:center;padding:11px;border-radius:9px;
    border:none;font-family:inherit;font-weight:800;font-size:13.5px;cursor:pointer;margin-top:8px;
    transition:background .12s,border-color .12s,color .12s}
  .btn-primary{background:var(--accent);color:#fff}
  .btn-primary:hover{background:#5870ff}
  .btn-ghost{background:var(--panel2);color:var(--ink);border:1px solid var(--line)}
  .btn-ghost:hover{background:var(--accent);border-color:var(--accent);color:#fff}
  .btn:disabled{opacity:.55;cursor:default}
  /* 다운로드 줄 버튼 — 평소엔 중립(어두운 배경+테두리), 호버 시에만 파란색 */
  .dl-btn{font-size:13px;padding:12px 8px;white-space:nowrap;border-color:#343a49}
  .dl-btn:hover:not(:disabled){background:var(--accent);border-color:var(--accent);color:#fff}
  .btn-row{display:flex;gap:8px}
  .btn-row .btn{margin-top:0}
  .mini{font-size:11px;color:var(--muted);margin-top:6px;line-height:1.5}

  /* ---------- CARD (1080x1080) ---------- */
  .card{width:1080px;height:1080px;position:relative;overflow:hidden;
    font-family:'Pretendard',sans-serif;background:var(--c-bg);color:var(--c-ink);
    padding:96px;display:flex;flex-direction:column}
  .card .topbar{position:absolute;top:0;left:0;width:240px;height:18px;background:var(--c-acc)}
  .card .kicker{font-size:30px;font-weight:800;letter-spacing:.04em;color:var(--c-acc);
    margin-bottom:30px;text-transform:uppercase}
  .card.cover .kicker{display:inline-block;align-self:flex-start;background:var(--c-ink);
    color:var(--c-bg);padding:16px 30px;border-radius:999px;margin-bottom:48px}
  .card .num{font-size:200px;font-weight:900;line-height:.85;color:var(--c-acc);
    letter-spacing:-.04em;margin-bottom:8px}
  .card .headline{font-size:82px;font-weight:900;line-height:1.1;letter-spacing:-.03em;
    white-space:pre-wrap}
  .card.cover .headline{font-size:104px;color:var(--c-ink)}
  .card .body{font-size:40px;font-weight:500;line-height:1.55;color:var(--c-sub);
    margin-top:28px;white-space:pre-wrap}
  .card .spacer{flex:1}
  .card .footer{display:flex;justify-content:space-between;align-items:center;
    font-size:30px;font-weight:800}
  .card .handle{color:var(--c-acc)}
  .card .dots{display:flex;gap:10px}
  .card .dot{width:14px;height:14px;border-radius:50%;background:var(--c-dot)}
  .card .dot.on{background:var(--c-acc)}
  .card.cover .handle{color:var(--c-ink)}
  .card.cover .dot.on{background:var(--c-ink)}
  .card .rule{width:120px;height:10px;background:var(--c-acc);margin:34px 0 0}
  .card.cover .rule{background:var(--c-ink)}
  /* 배경 이미지 (AI 자동 생성/직접 첨부) — 셰이드를 깔아 글씨 가독성 확보.
     기본은 어두운 셰이드+흰 글씨, 밝은 이미지(자동 감지)는 밝은 셰이드+검은 글씨 */
  .card .bgimg{position:absolute;inset:0;background-size:cover;background-position:center}
  .card .bgshade{position:absolute;inset:0;background:linear-gradient(180deg,rgba(0,0,0,.35),rgba(0,0,0,.62))}
  .card.bg-light .bgshade{background:linear-gradient(180deg,rgba(255,255,255,.30),rgba(255,255,255,.55))}
  .card.has-bg>:is(.kicker,.num,.headline,.body,.rule,.footer,.duo-head,.duo-wrap,.duo-cta){position:relative;z-index:1}
  .card.has-bg .topbar{z-index:1}
  /* 프롬프트(2단) 카드 — 아이템 2개가 흰 패널로 나란히, 상단 제목 + 하단 CTA */
  .card.duo{padding:64px 56px}
  .card .duo-head{font-size:56px;font-weight:900;text-align:center;letter-spacing:-.02em;
    margin-bottom:36px;white-space:pre-wrap}
  .card .duo-wrap{display:flex;gap:32px;flex:1;min-height:0}
  .card .duo-item{flex:1;background:rgba(255,255,255,.96);border-radius:26px;padding:26px;
    display:flex;flex-direction:column;color:#1b1d25;box-shadow:0 14px 40px rgba(0,0,0,.25)}
  .card .duo-num{display:inline;font-size:42px;font-weight:900;color:var(--c-acc)}
  .card .duo-title{font-size:38px;font-weight:900;line-height:1.15;color:#1b1d25;
    margin:4px 0 16px;white-space:pre-wrap}
  .card .duo-img{width:100%;aspect-ratio:1/1;border-radius:16px;background-size:cover;
    background-position:center;background-color:#e8eaf2;margin-bottom:16px;flex-shrink:0}
  .card .duo-desc{font-size:25px;line-height:1.45;color:#3c4150;white-space:pre-wrap}
  .card .duo-cta{margin-top:32px;background:rgba(255,255,255,.94);color:#1b1d25;border-radius:999px;
    padding:18px 40px;text-align:center;font-size:28px;font-weight:800;align-self:center;max-width:90%}
  /* 빈 페이지의 자유 배치 텍스트(제목/본문/핸들) — 드래그 이동, 코너 핸들로 글자 확대/축소 */
  .card .tx{position:absolute;z-index:2;cursor:move;touch-action:none;margin:0;white-space:pre-wrap;max-width:888px}
  .card .tx.sel{outline:4px dashed rgba(61,90,254,.85);outline-offset:4px}
  /* 자유 배치 이미지(스티커) — 드래그 이동, 가장자리 핸들(상하좌우) 늘리기, 코너 핸들 비율 확대 */
  .card .ov{position:absolute;z-index:2;cursor:move;touch-action:none}
  .card .ov.sel{outline:4px dashed rgba(61,90,254,.85);outline-offset:4px}
  .card .ov img{width:100%;display:block;pointer-events:none}
  .card .ov .ovh{position:absolute;background:var(--accent);border:3px solid #fff;
    box-shadow:0 2px 10px rgba(0,0,0,.45);z-index:3}
  .card .ov .ovh-se{right:-18px;bottom:-18px;width:34px;height:34px;border-radius:50%;cursor:nwse-resize}
  .card .ov .ovh-e{right:-13px;top:50%;transform:translateY(-50%);width:22px;height:58px;border-radius:11px;cursor:ew-resize}
  .card .ov .ovh-w{left:-13px;top:50%;transform:translateY(-50%);width:22px;height:58px;border-radius:11px;cursor:ew-resize}
  .card .ov .ovh-n{top:-13px;left:50%;transform:translateX(-50%);width:58px;height:22px;border-radius:11px;cursor:ns-resize}
  .card .ov .ovh-s{bottom:-13px;left:50%;transform:translateX(-50%);width:58px;height:22px;border-radius:11px;cursor:ns-resize}
  /* 갤러리 피커 (앱에서 받아둔 이미지 재사용) */
  .gal-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;max-height:420px;overflow-y:auto}
  .gal-grid img{width:100%;aspect-ratio:1/1;object-fit:cover;border-radius:8px;cursor:pointer;
    border:2px solid transparent;transition:border-color .1s}
  .gal-grid img:hover{border-color:var(--accent)}
  .gal-empty{grid-column:1/-1;font-size:12px;color:var(--muted);padding:24px;text-align:center}
  .gal-tgt{display:flex;gap:6px;margin-bottom:10px}
  .gal-tgt .chip{font-size:11.5px}
  .ov-allchk{display:flex;align-items:center;gap:5px;font-size:11.5px;color:var(--muted);cursor:pointer;font-weight:600}
  .ov-allchk input{width:auto;accent-color:var(--accent);cursor:pointer}
  .ov-row{display:flex;gap:8px;align-items:center;margin-top:8px}
  .ov-row img{width:46px;height:46px;object-fit:cover;border-radius:8px;border:1px solid var(--line);flex-shrink:0}
  .ov-ctl{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
  .ov-rad{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted)}
  .ov-rad input[type=range]{flex:1;accent-color:var(--accent);min-width:0}
  .ov-rad b{min-width:30px;text-align:right;color:var(--ink)}
  .ov-btns{display:flex;gap:6px}
  .ov-btns .btn{margin-top:0;padding:7px;font-size:12px}
</style>
</head>
<body>
<div class="stage">
  <div class="frame" id="frame" onclick="openDrawer()" title="클릭하면 편집 패널이 열립니다">
    <div class="scaler" id="scaler"><div class="card" id="card"></div></div>
  </div>
  <div class="nav">
    <button onclick="prev()">‹</button>
    <span class="pos" id="pos">1 / 1</span>
    <button onclick="next()">›</button>
  </div>
  <div class="chips" id="slidebar"></div>
  <div class="hint">카드를 클릭하면 오른쪽에 편집 패널이 열립니다.</div>
</div>

<button class="edit-fab" onclick="toggleDrawer()">✎ 편집</button>

<div class="backdrop" id="backdrop" onclick="closeDrawer()"></div>
<div class="drawer" id="drawer">
  <div class="drawer-head">
    <h1>카드 편집</h1>
    <button class="x" onclick="closeDrawer()">×</button>
  </div>

  <div class="group">
    <label>색상</label>
    <div class="color-cols">
      <div class="color-col"><span>배경</span><button class="color-chip" id="bgChip" onclick="openCp('bg')"></button></div>
      <div class="color-col"><span>액센트</span><button class="color-chip" id="accChip" onclick="openCp('accent')"></button></div>
    </div>
  </div>

  <div class="group">
    <label>글씨체</label>
    <div class="font-row" style="margin-bottom:8px">
      <select id="fontTgt" onchange="onFontTarget()">
        <option value="kicker">상단 라벨</option>
        <option value="headline" selected>제목</option>
        <option value="body">본문</option>
        <option value="handle">핸들</option>
      </select>
    </div>
    <div class="font-row">
      <select id="fontFam" onchange="onFamChange()" style="flex:1.7"></select>
      <select id="fontWt" onchange="onWtChange()" style="flex:1"></select>
    </div>
    <div class="size-row">
      <span>크기</span>
      <input type="range" id="fontSize" min="10" max="240" step="1" oninput="onSizeChange(this.value)">
      <span id="fontSizeVal">82</span>
    </div>
  </div>

  <div class="group">
    <label>슬라이드</label>
    <div class="btn-row">
      <button class="btn btn-ghost" onclick="addSlide()">+ 팁 추가</button>
      <button class="btn btn-ghost" onclick="addBlankSlide()">+ 빈 페이지</button>
      <button class="btn btn-ghost" onclick="delSlide()">선택 삭제</button>
    </div>
    <div class="btn-row" style="margin-top:8px">
      <button class="btn btn-ghost" onclick="addDuoSlide()">+ 프롬프트(2단) 카드</button>
      <button class="btn btn-ghost" onclick="resetDeck()" title="자동 저장 포함 전체 초기화" style="flex:0 0 90px">초기화</button>
    </div>
  </div>

  <div class="group">
    <label>내용 편집</label>
    <div id="editor"></div>
  </div>

  <div class="group">
    <div class="field-head"><label style="margin:0">브랜드 핸들</label><button class="mini-sw" id="sw-handleColor" onclick="openCp('handleColor')" title="글씨 색 변경"></button></div>
    <input id="handle" value="@aitoolbee" oninput="setHandle(this.value)">
  </div>

  <div class="group">
    <div class="btn-row">
      <button class="btn btn-ghost dl-btn" onclick="downloadOne()">⬇ 이 카드 PNG</button>
      <button class="btn btn-ghost dl-btn" id="dlAllBtn" onclick="downloadAll()">🗂 전체 zip</button>
      <button class="btn btn-ghost dl-btn" onclick="openDlFolder()" title="다운로드 폴더 열기" style="flex:0 0 46px;padding:11px 0">📁</button>
    </div>
    <p class="mini">받은 이미지를 Meta 비즈니스 스위트에 캐러셀로 올려 예약하면 끝.</p>
  </div>
</div>

<!-- 갤러리 피커 모달 — 앱 갤러리에 받아둔 이미지를 재사용 -->
<div class="cp-ov" id="galOv" onclick="if(event.target===this)closeGal()">
  <div class="cp" style="width:540px">
    <div class="cp-head"><b>갤러리에서 선택</b><button onclick="closeGal()">×</button></div>
    <div class="gal-tgt" id="galTgtRow"></div>
    <div class="gal-grid" id="galGrid"></div>
  </div>
</div>

<!-- 색상 피커 모달 (배경/액센트 공용) -->
<div class="cp-ov" id="cpOv" onclick="if(event.target===this)closeCp()">
  <div class="cp">
    <div class="cp-head"><b id="cpTitle">색상</b><button onclick="closeCp()">×</button></div>

</div>

<script>
const THEMES = [
  {name:'전기 블루', acc:'#3d5afe'},
  {name:'시그널 옐로우', acc:'#ffe600'},
  {name:'비비드 코랄', acc:'#ff3b30'},
  {name:'네온 라임', acc:'#c6ff00'},
  {name:'핫 핑크', acc:'#ff2d95'},
];
const DARK={bg:'#0b0c10', ink:'#ffffff', sub:'#9aa0b0', dot:'rgba(255,255,255,.18)'};

let accent = THEMES[0].acc;
let bgColor = '#0b0c10'; // 표지 외 카드 배경색(사용자 설정)
let handleColor = ''; // 브랜드 핸들 글씨색 오버라이드(빈값=기본)
// 요소별 글씨체(모든 슬라이드 전역). Pretendard 는 CDN 기본.
const elFont = { kicker:'Pretendard', headline:'Pretendard', body:'Pretendard', handle:'Pretendard' };
// 요소별 글씨 크기 오버라이드(px). 0이면 기본값 사용.
const elSize = { kicker:0, headline:0, body:0, handle:0 };
const SIZE_DEFAULT = { kicker:30, headline:82, body:40, handle:30 };
let fontTarget = 'headline';
// 대표 패밀리 + 굵기. css = @font-face / font-family 에 쓰는 고유 이름. file=null 이면 CDN(Pretendard).
const FAMILIES = [
  { label:'프리텐다드 (기본)', weights:[ {label:'기본', css:'Pretendard', file:null} ] },
  { label:'검은고딕', weights:[ {label:'기본', css:'BlackHanSans', file:'BlackHanSans-Regular.ttf'} ] },
  { label:'카페24 써라운드', weights:[ {label:'기본', css:'Cafe24Ssurround', file:'Cafe24Ssurround-v2.0.ttf'} ] },
  { label:'고도', weights:[ {label:'M', css:'GodoM', file:'GodoM.ttf'}, {label:'B(굵게)', css:'GodoB', file:'GodoB.ttf'} ] },
  { label:'고운돋움', weights:[ {label:'기본', css:'GowunDodum', file:'GowunDodum-Regular.ttf'} ] },
  { label:'레시피코리아', weights:[ {label:'기본', css:'Recipekorea', file:'Recipekorea.ttf'} ] },
  { label:'리아산스', weights:[
    {label:'Regular', css:'RiaSans', file:'RiaSans-Regular.ttf'},
    {label:'Bold', css:'RiaSansBold', file:'RiaSans-Bold.ttf'},
    {label:'ExtraBold', css:'RiaSansEB', file:'RiaSans-ExtraBold.ttf'} ] },
  { label:'아리따부리', weights:[
    {label:'헤어라인', css:'AritaBuriHair', file:'AritaBuriKR-HairLine.ttf'},
    {label:'Light', css:'AritaBuriLight', file:'AritaBuriKR-Light.ttf'},
    {label:'Medium', css:'AritaBuriMedium', file:'AritaBuriKR-Medium.ttf'},
    {label:'SemiBold', css:'AritaBuriSemiBold', file:'AritaBuriKR-SemiBold.ttf'},
    {label:'Bold', css:'AritaBuriBold', file:'AritaBuriKR-Bold.ttf'} ] },
  { label:'페이퍼로지', weights:[
    {label:'Thin', css:'Paperlogy1', file:'Paperlogy-1Thin.ttf'},
    {label:'ExtraLight', css:'Paperlogy2', file:'Paperlogy-2ExtraLight.ttf'},
    {label:'Light', css:'Paperlogy3', file:'Paperlogy-3Light.ttf'},
    {label:'Regular', css:'Paperlogy4', file:'Paperlogy-4Regular.ttf'},
    {label:'Medium', css:'Paperlogy5', file:'Paperlogy-5Medium.ttf'},
    {label:'SemiBold', css:'Paperlogy6', file:'Paperlogy-6SemiBold.ttf'},
    {label:'Bold', css:'Paperlogy7', file:'Paperlogy-7Bold.ttf'},
    {label:'ExtraBold', css:'Paperlogy8', file:'Paperlogy-8ExtraBold.ttf'},
    {label:'Black', css:'Paperlogy9', file:'Paperlogy-9Black.ttf'} ] },
  { label:'프리젠테이션', weights:[ {label:'기본', css:'Freesentation', file:'FreesentationVF.ttf'} ] },
  { label:'MBC1961 굴림', weights:[ {label:'기본', css:'MBC1961Gulim', file:'MBC1961Gulim.otf'} ] },
  { label:'Swagger (영문)', weights:[ {label:'기본', css:'Swagger', file:'Swagger.ttf'} ] },
  { label:'Palladium (영문)', weights:[ {label:'기본', css:'Palladium', file:'Palladium.ttf'} ] },
];
let cur = 0;
let handle = '@aitoolbee';
let ovSel = -1; // 선택된 자유 배치 이미지 인덱스(-1=없음) — 선택된 것에만 가이드(핸들) 표시
let gImgs = []; // 전체 카드 공통 스티커("전체 적용" 체크) — 모든 슬라이드에 같은 위치/크기로 표시
let ovAll = false; // 자유 배치 "전체 적용" 모드
let txSel = null; // 빈 페이지에서 선택된 자유 배치 텍스트 키('headline'|'body'|'handle')
// 빈 페이지 자유 배치 텍스트 기본 위치/크기 (1080 좌표계)
const TX_DEF = { headline:{x:96,y:120,size:96}, body:{x:96,y:420,size:40}, handle:{x:96,y:930,size:30} };
// 슬라이드 i 의 자유 배치 이미지 목록 = 슬라이드 전용 + 전체 공통 (combined 인덱스 기준)
function ovList(i){ return (slides[i].imgs||[]).concat(gImgs); }
// combined 인덱스 k → 실제 배열/인덱스 (삭제·배경 전환용)
function ovRef(k){
  const loc = slides[cur].imgs||[];
  return k < loc.length ? { arr: loc, idx: k } : { arr: gImgs, idx: k - loc.length };
}

// type: cover | tip | outro | blank | duo
function defaultSlides(){
  return [
    {type:'cover', kicker:'AI 툴 꿀팁', headline:'몰라서 손해 본\n프롬프트 한 줄', body:''},
    {type:'tip', kicker:'TIP', headline:'역할부터 박아라', body:'“너는 10년차 카피라이터다”\n한 줄이 결과 품질을 바꾼다.'},
    {type:'tip', kicker:'TIP', headline:'예시를 같이 줘라', body:'원하는 톤의 샘플 1~2개를 붙이면\n적중률이 눈에 띄게 올라간다.'},
    {type:'tip', kicker:'TIP', headline:'형식을 지정해라', body:'표·번호·JSON 등 출력 형식을\n먼저 정하면 다듬는 시간이 준다.'},
    {type:'outro', kicker:'SAVE & FOLLOW', headline:'내일도 한 개\nAI 툴 팁', body:'팔로우하면 매일 올라옵니다.'},
  ];
}
let slides = defaultSlides();

const $ = s => document.querySelector(s);

function tipIndex(i){ let n=0; for(let k=0;k<=i;k++){ if(slides[k].type==='tip') n++; } return n; }

function coverInk(hex){
  const n=parseInt(hex.slice(1),16),r=n>>16&255,g=n>>8&255,b=n&255;
  const lum=(0.2126*r+0.7152*g+0.0722*b)/255;
  return lum>0.6 ? '#0b0c10' : '#ffffff';
}

// ui=true(미리보기)일 때만 크기조정 핸들 등 편집 UI 를 그린다 — PNG 스냅샷(ui=false)에는 안 찍힘
function renderCard(i, node, ui){
  const s = slides[i];
  node.className = 'card ' + s.type + (s.bg ? ' has-bg' + (s.bgLight ? ' bg-light' : '') : '');
  node.style.setProperty('--c-acc', accent);
  if(s.type==='cover'){
    const ink = coverInk(accent);
    node.style.setProperty('--c-bg', accent);
    node.style.setProperty('--c-ink', ink);
    node.style.setProperty('--c-sub', ink==='#ffffff'?'rgba(255,255,255,.85)':'rgba(0,0,0,.7)');
    node.style.setProperty('--c-dot', ink==='#ffffff'?'rgba(255,255,255,.35)':'rgba(0,0,0,.25)');
  } else {
    const ink = coverInk(bgColor);
    node.style.setProperty('--c-bg', bgColor);
    node.style.setProperty('--c-ink', ink);
    node.style.setProperty('--c-sub', ink === '#ffffff' ? 'rgba(255,255,255,.62)' : 'rgba(0,0,0,.62)');
    node.style.setProperty('--c-dot', ink === '#ffffff' ? 'rgba(255,255,255,.18)' : 'rgba(0,0,0,.18)');
  }
  if(s.bg){ // 배경 이미지: 밝기(자동 감지)에 맞춰 글씨색 강제 — 어두우면 흰 글씨, 밝으면 검은 글씨
    const light = !!s.bgLight;
    node.style.setProperty('--c-ink', light ? '#0b0c10' : '#ffffff');
    node.style.setProperty('--c-sub', light ? 'rgba(0,0,0,.72)' : 'rgba(255,255,255,.85)');
    node.style.setProperty('--c-dot', light ? 'rgba(0,0,0,.25)' : 'rgba(255,255,255,.35)');
  }

  // 요소별 글씨색 + 글씨체 오버라이드 (설정 시 인라인으로 기본값 덮어씀)
  const estyle = (col, fam, size) => {
    let st = '';
    if (col) st += `color:${col};`;
    if (fam && fam !== 'Pretendard') st += `font-family:'${fam}',sans-serif;`;
    if (size) st += `font-size:${size}px;`;
    return st ? ` style="${st}"` : '';
  };
  const kStyle = estyle(s.kColor, elFont.kicker, elSize.kicker);
  const hStyle = estyle(s.hColor, elFont.headline, elSize.headline);
  const bStyle = estyle(s.bColor, elFont.body, elSize.body);
  const hdStyle = estyle(handleColor, elFont.handle, elSize.handle);

  const dots = slides.map((_,k)=>`<span class="dot ${k===i?'on':''}"></span>`).join('');
  let mid = '';
  if(s.type==='tip'){
    mid = `<div class="num">${String(tipIndex(i)).padStart(2,'0')}</div>
           <div class="headline"${hStyle}>${esc(s.headline)}</div>
           ${s.body?`<div class="body"${bStyle}>${esc(s.body)}</div>`:''}`;
  } else if(s.type==='cover'){
    mid = `<div class="headline"${hStyle}>${esc(s.headline)}</div>
           <div class="rule"></div>
           ${s.body?`<div class="body"${bStyle}>${esc(s.body)}</div>`:''}`;
  } else if(s.type==='blank'){
    mid = ''; // 빈 페이지 텍스트는 아래 txs(자유 배치 텍스트)로 렌더
  } else if(s.type==='duo'){
    // 프롬프트(2단) 카드: 아이템 2개(번호+제목+이미지+설명), headline=상단 제목, body=하단 CTA
    const it = s.items || [];
    mid = `${s.headline?`<div class="duo-head"${hStyle}>${esc(s.headline)}</div>`:''}
      <div class="duo-wrap">${[0,1].map(j=>{
        const o = it[j]; if(!o) return '';
        return `<div class="duo-item">
          <div><span class="duo-num">${esc(o.n||String(j+1))}.</span></div>
          <div class="duo-title">${esc(o.title||'')}</div>
          <div class="duo-img"${o.img?` style="background-image:url('${o.img}')"`:''}></div>
          ${o.desc?`<div class="duo-desc">${esc(o.desc)}</div>`:''}
        </div>`}).join('')}</div>
      ${s.body?`<div class="duo-cta"${bStyle}>${esc(s.body)}</div>`:''}`;
  } else {
    mid = `<div class="headline"${hStyle}>${esc(s.headline)}</div>
           ${s.body?`<div class="body"${bStyle}>${esc(s.body)}</div>`:''}`;
  }

  const handles = '<span class="ovh ovh-n" data-dir="n"></span><span class="ovh ovh-s" data-dir="s"></span>'
    + '<span class="ovh ovh-w" data-dir="w"></span><span class="ovh ovh-e" data-dir="e"></span>'
    + '<span class="ovh ovh-se" data-dir="se"></span>';

  // 빈 페이지: 제목/본문/핸들을 자유 배치 텍스트로 — 드래그 이동 + 핸들(상하좌우/코너)로 글자 확대/축소.
  // 핸들명은 기본 숨김(s.hideHandle) — 핸들 입력칸에 다시 타이핑하면 나타남.
  let txs = '';
  if (s.type === 'blank') {
    const items = [
      s.headline ? ['headline', s.headline, s.hColor] : null,
      s.body ? ['body', s.body, s.bColor] : null,
      handle && !s.hideHandle ? ['handle', handle, handleColor] : null
    ].filter(Boolean);
    txs = items.map(([key, text, col]) => {
      const c = (s.tx && s.tx[key]) || TX_DEF[key];
      const sel2 = ui && txSel === key;
      const fam = elFont[key];
      let st = `left:${c.x}px;top:${c.y}px;font-size:${c.size}px;`;
      if (col) st += `color:${col};`;
      if (fam && fam !== 'Pretendard') st += `font-family:'${fam}',sans-serif;`;
      return `<div class="tx ${key}${sel2?' sel':''}" data-tx="${key}" style="${st}">${esc(text)}${sel2?handles:''}</div>`;
    }).join('');
  }
  // 가이드(핸들+점선)는 선택된 이미지에만 — 다른 곳을 클릭하면 사라지고 이미지를 클릭하면 다시 표시
  const ovs = ovList(i).map((o,k)=>{
    const sel = ui && k === ovSel;
    return `<div class="ov${sel?' sel':''}" data-ov="${k}" style="left:${o.x}px;top:${o.y}px;width:${o.w}px;${o.h?`height:${o.h}px;`:''}">
       <img src="${o.src}" style="${o.h?'height:100%;object-fit:fill;':''}${o.r?`border-radius:${o.r}px;`:''}">${sel?handles:''}
     </div>`}).join('');

  // 빈 페이지는 상단바/라벨/푸터(핸들·도트) 없이 깨끗한 캔버스로
  const chrome = s.type !== 'blank';
  node.innerHTML = `
    ${s.bg?`<div class="bgimg" style="background-image:url('${s.bg}')"></div><div class="bgshade"></div>`:''}
    ${chrome && s.type!=='duo'?`<div class="topbar"></div>
    <div class="kicker"${kStyle}>${esc(s.kicker||'')}</div>`:''}
    ${mid}
    ${s.type==='duo'?'':'<div class="spacer"></div>'}
    ${chrome?`<div class="footer">
      <span class="handle"${hdStyle}>${esc(handle)}</span>
      <span class="dots">${dots}</span>
    </div>`:''}
    ${txs}
    ${ovs}`;
}
function esc(t){return (t||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function fitScaler(){
  const frame = $('.frame').clientWidth;
  $('#scaler').style.transform = `scale(${frame/1080})`;
}

// ── 자동 저장 (IndexedDB — 이미지 dataURL 이 커서 localStorage 5MB 로는 부족) ──
const DB_NAME = 'cardnews', DB_STORE = 'state';
function idbOpen(){
  return new Promise((res, rej) => {
    const r = indexedDB.open(DB_NAME, 1);
    r.onupgradeneeded = () => r.result.createObjectStore(DB_STORE);
    r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error);
  });
}
async function saveState(){
  try{
    const db = await idbOpen();
    const data = { v:1, slides, handle, accent, bgColor, handleColor,
      elFont:{...elFont}, elSize:{...elSize}, gImgs, ovAll, cur };
    db.transaction(DB_STORE, 'readwrite').objectStore(DB_STORE).put(data, 'deck');
  }catch(e){}
}
let saveTimer = null;
function scheduleSave(){ clearTimeout(saveTimer); saveTimer = setTimeout(saveState, 600); }
async function loadState(){
  try{
    const db = await idbOpen();
    return await new Promise((res) => {
      const rq = db.transaction(DB_STORE).objectStore(DB_STORE).get('deck');
      rq.onsuccess = () => res(rq.result || null); rq.onerror = () => res(null);
    });
  }catch(e){ return null; }
}
function resetDeck(){
  if(!confirm('카드뉴스를 처음 상태로 초기화할까요? (자동 저장된 내용도 지워집니다)')) return;
  slides = defaultSlides(); gImgs = []; ovAll = false; cur = 0; ovSel = -1; txSel = null;
  draw();
}

// 카드+슬라이드바만 다시 그림 (편집 필드는 건드리지 않음 → 입력 포커스 유지)
function drawCard(){
  renderCard(cur, $('#card'), true);
  fitScaler();
  $('#pos').textContent = `${cur+1} / ${slides.length}`;
  buildSlidebar();
  scheduleSave(); // 모든 변경이 여길 지나므로 여기서 자동 저장
}
// 전체(편집 필드 포함) — 슬라이드 전환 등에서만 사용
function draw(){
  drawCard();
  buildEditor();
}

function buildColorChips(){
  $('#bgChip').style.background = bgColor;
  $('#accChip').style.background = accent;
  const hs = document.getElementById('sw-handleColor');
  if (hs && handleColor) hs.style.background = handleColor;
}
function setAccent(a){accent=a;buildColorChips();drawCard();}
function setBg(b){bgColor=b;buildColorChips();drawCard();}

// ── 글씨체 (대표 패밀리 + 굵기) ──
function injectFonts(){
  const faces = [];
  FAMILIES.forEach(f => f.weights.forEach(w => {
    if (w.file) faces.push(`@font-face{font-family:'${w.css}';src:url('fonts/${encodeURIComponent(w.file)}');font-display:swap;}`);
  }));
  const st = document.createElement('style'); st.textContent = faces.join('\n'); document.head.appendChild(st);
}
function famIndexByCss(css){
  for (let i = 0; i < FAMILIES.length; i++) if (FAMILIES[i].weights.some(w => w.css === css)) return i;
  return 0;
}
function buildFontSelect(){
  $('#fontFam').innerHTML = FAMILIES.map((f, i) => `<option value="${i}">${f.label}</option>`).join('');
  syncFontDropdowns();
}
function buildWeightSelect(fi, selCss){
  const fam = FAMILIES[fi];
  $('#fontWt').innerHTML = fam.weights.map((w, j) => `<option value="${j}">${w.label}</option>`).join('');
  const wi = Math.max(0, fam.weights.findIndex(w => w.css === selCss));
  $('#fontWt').value = wi;
  $('#fontWt').disabled = fam.weights.length <= 1; // 굵기 1종이면 비활성
}
function syncFontDropdowns(){
  const css = elFont[fontTarget];
  const fi = famIndexByCss(css);
  $('#fontFam').value = fi;
  buildWeightSelect(fi, css);
  syncSize();
}
function syncSize(){
  const v = elSize[fontTarget] || SIZE_DEFAULT[fontTarget];
  $('#fontSize').value = v; $('#fontSizeVal').textContent = v;
}
function onSizeChange(v){ elSize[fontTarget] = +v; $('#fontSizeVal').textContent = v; drawCard(); }
function onFontTarget(){ fontTarget = $('#fontTgt').value; syncFontDropdowns(); }
function onFamChange(){
  const fi = +$('#fontFam').value;
  const css = FAMILIES[fi].weights[0].css; // 대표(첫) 굵기로
  elFont[fontTarget] = css; buildWeightSelect(fi, css); drawCard();
}
function onWtChange(){
  const fi = +$('#fontFam').value, wj = +$('#fontWt').value;
  elFont[fontTarget] = FAMILIES[fi].weights[wj].css; drawCard();
}

// ── 색상 피커 모달 (배경/액센트 공용) ──
const PALETTE = [
  '#000000','#434343','#666666','#999999','#b7b7b7','#cccccc','#d9d9d9','#ffffff',
  '#f4cccc','#fce5cd','#fff2cc','#d9ead3','#d0e0e3','#cfe2f3','#d9d2e9','#ead1dc',
  '#ea9999','#f9cb9c','#ffe599','#b6d7a8','#a2c4c9','#9fc5e8','#b4a7d6','#d5a6bd',
  '#e06666','#f6b26b','#ffd966','#93c47d','#76a5af','#6fa8dc','#8e7cc3','#c27ba6',
  '#cc0000','#e69138','#f1c232','#6aa84f','#45818e','#3d85c6','#674ea7','#a64d79',
  '#990000','#b45f06','#bf9000','#38761d','#134f5c','#0b5394','#351c75','#741b47',
  '#0b0c10','#1d2029','#2c1d10','#3d5afe','#ffe600','#ff3b30','#c6ff00','#ff2d95'
];
let cpTarget = 'accent';
const CP_TITLES = { bg:'배경 색상', accent:'액센트 색상', kColor:'상단 라벨 글씨색', hColor:'제목 글씨색', bColor:'본문 글씨색', handleColor:'브랜드 핸들 글씨색' };
function curColor(t){
  if(t==='bg') return bgColor;
  if(t==='accent') return accent;
  if(t==='handleColor') return handleColor;
  return slides[cur][t] || ''; // kColor / hColor / bColor (슬라이드별)
}
function openCp(t){
  cpTarget = t;
  $('#cpTitle').textContent = CP_TITLES[t] || '색상';
  $('#cpGrid').innerHTML = PALETTE.map(c =>
    `<div class="c" style="background:${c}" onclick="cpApply('${c}')" title="${c}"></div>`).join('');

function cpApply(c){
  c = (c || '').trim(); if (c && c[0] !== '#') c = '#' + c;
  if (!/^#([0-9a-fA-F]{6}|[0-9a-fA-F]{3})$/.test(c)) return;
  if (cpTarget === 'bg') setBg(c);
  else if (cpTarget === 'accent') setAccent(c);
  else if (cpTarget === 'handleColor') { handleColor = c; drawCard(); }
  else { slides[cur][cpTarget] = c; drawCard(); } // kColor / hColor / bColor
  $('#cpHex').value = c; $('#cpPrev').style.background = c;
  const sw = document.getElementById('sw-' + cpTarget); // 해당 색 버튼 즉시 갱신

}

// ── 갤러리 피커: 앱 갤러리(ChatGPT/Flow 등에서 받아둔 이미지)를 재사용 ──

// "전체 적용" 토글: 켜면 현재 슬라이드의 자유 배치 이미지를 전체 공통으로, 끄면 현재 슬라이드 전용으로 되돌림
function toggleOvAll(on){
  ovAll = !!on; ovSel = -1;
  if (on) { const loc = slides[cur].imgs||[]; gImgs.push(...loc); slides[cur].imgs = []; }
  else { (slides[cur].imgs = slides[cur].imgs||[]).push(...gImgs); gImgs = []; }

}
function setOvRad(k,v){
  const o = ovList(cur)[k]; if(!o) return;
  o.r = +v; const lb = document.getElementById('ovr-'+k); if (lb) lb.textContent = v;

}
// ── 자유 배치 이미지(스티커) ──
// 추가 공통 경로: 버튼/붙여넣기/드래그앤드롭 모두 여기로. x,y 생략 시 중앙 부근.
function addSticker(src, x, y){
  // "전체 적용" 모드면 전체 공통 배열로, 아니면 현재 슬라이드 전용으로
  (ovAll ? gImgs : (slides[cur].imgs=slides[cur].imgs||[])).push({src, x: x!=null?x:340, y: y!=null?y:340, w:400});
  ovSel = ovList(cur).length - 1; txSel = null; // 방금 추가한 이미지를 선택해 가이드 표시
  draw();
}
function addImg(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f)return;
    const fr=new FileReader(); fr.onload=()=>addSticker(fr.result); fr.readAsDataURL(f); };
  inp.click();
}
// 클립보드 이미지 붙여넣기(Cmd/Ctrl+V) → 자유 배치로 추가
document.addEventListener('paste', (e) => {
  const items = e.clipboardData && e.clipboardData.items; if (!items) return;
  for (const it of items) {
    if (it.kind === 'file' && it.type.startsWith('image/')) {
      const f = it.getAsFile(); if (!f) continue;
      e.preventDefault();
      const fr = new FileReader(); fr.onload = () => addSticker(fr.result); fr.readAsDataURL(f);
      return;
    }
  }
});
// 이미지 파일 드래그앤드롭 → 자유 배치로 추가. 카드 위에 놓으면 그 지점에 배치.
document.addEventListener('dragover', (e) => e.preventDefault());
document.addEventListener('drop', (e) => {
  e.preventDefault();
  const files = Array.from((e.dataTransfer && e.dataTransfer.files) || []).filter(f => f.type.startsWith('image/'));
  if (!files.length) return;
  let x = null, y = null;
  const r = $('#card').getBoundingClientRect();
  if (e.clientX >= r.left && e.clientX <= r.right && e.clientY >= r.top && e.clientY <= r.bottom) {
    const scale = r.width / 1080; // 드롭 지점을 1080 좌표로 변환, 기본 폭(400) 기준 중앙 정렬
    x = Math.round((e.clientX - r.left) / scale) - 200;
    y = Math.round((e.clientY - r.top) / scale) - 150;
  }
  files.forEach((f, i) => {
    const fr = new FileReader();
    fr.onload = () => addSticker(fr.result, x!=null ? x + i*40 : null, y!=null ? y + i*40 : null);
    fr.readAsDataURL(f);
  });
});
function delImg(k){ const r=ovRef(k); r.arr.splice(r.idx,1); ovSel=-1; draw(); }
function imgToBg(k){ const r=ovRef(k); const o=r.arr[r.idx]; r.arr.splice(r.idx,1); ovSel=-1; setSlideBg(slides[cur], o.src); buildEditor(); }
// 배경 이미지 평균 밝기를 재서(32x32 축소 샘플) 밝은 이미지면 검은 글씨 모드로 전환
function setSlideBg(s, dataUrl){
  s.bg = dataUrl; s.bgLight = false;
  const im = new Image();
  im.onload = () => {
    try{
      const cv = document.createElement('canvas'); cv.width = cv.height = 32;
      const cx = cv.getContext('2d'); cx.drawImage(im, 0, 0, 32, 32);
      const d = cx.getImageData(0, 0, 32, 32).data;
      let sum = 0;
      for (let i = 0; i < d.length; i += 4) sum += 0.2126*d[i] + 0.7152*d[i+1] + 0.0722*d[i+2];
      s.bgLight = (sum / (d.length / 4) / 255) > 0.6;
    }catch(e){}
    if (s.bg === dataUrl) draw();
  };
  im.src = dataUrl;
  draw();
}
function pickBg(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.onchange=()=>{ const f=inp.files&&inp.files[0]; if(!f)return;
    const fr=new FileReader(); fr.onload=()=>{ setSlideBg(slides[cur], fr.result); }; fr.readAsDataURL(f); };
  inp.click();
}
function clearBg(){ delete slides[cur].bg; delete slides[cur].bgLight; draw(); }
function attr(t){return (t||'').replace(/"/g,'&quot;');}
function upd(k,v){slides[cur][k]=v;drawCard();} // 편집 필드 재생성 안 함 → 입력 중 포커스 유지
function setHandle(v){
  handle=v;
  // 빈 페이지에서 핸들을 지웠어도(hideHandle) 핸들 입력칸에 다시 타이핑하면 그 슬라이드에 다시 표시
  if(slides[cur].type==='blank' && v) delete slides[cur].hideHandle;
  drawCard();
}
function go(i){cur=i;ovSel=-1;txSel=null;draw();openDrawer();}
function prev(){cur=(cur-1+slides.length)%slides.length;ovSel=-1;txSel=null;draw();}
function next(){cur=(cur+1)%slides.length;ovSel=-1;txSel=null;draw();}
function addSlide(){
  const insertAt = cur+1;
  slides.splice(insertAt,0,{type:'tip',kicker:'TIP',headline:'새 팁 제목',body:'설명을 입력하세요.'});

}
function addBlankSlide(){
  const insertAt = cur+1;
  slides.splice(insertAt,0,{type:'blank',kicker:'',headline:'',body:'',hideHandle:true}); // 핸들명은 기본 미표시

}
function addDuoSlide(){
  const insertAt = cur+1;
  slides.splice(insertAt,0,{type:'duo',kicker:'',headline:'상단 제목',body:'',
    items:[{n:'1',title:'아이템 1',desc:'설명을 입력하세요.'},{n:'2',title:'아이템 2',desc:'설명을 입력하세요.'}]});

function delSlide(){

// ── 편집 드로어(우측 패널) — 열리면 카드 영역을 왼쪽으로 밀어 겹치지 않게 ──
function refit(){ fitScaler(); [80,180,300].forEach(t=>setTimeout(fitScaler,t)); } // 폭 트랜지션 동안 카드 스케일 재계산
function openDrawer(){ document.body.classList.add('drawer-open'); $('#drawer').classList.add('open'); refit(); }
function closeDrawer(){ document.body.classList.remove('drawer-open'); $('#drawer').classList.remove('open'); refit(); }
function toggleDrawer(){ $('#drawer').classList.contains('open') ? closeDrawer() : openDrawer(); }
document.addEventListener('keydown', e => {
  if(e.key!=='Escape') return;
  if($('#cpOv').classList.contains('open')) closeCp(); // 피커가 떠있으면 피커부터 닫음
  else closeDrawer();
});

async function snap(i){
  await document.fonts.ready;
  const holder=document.createElement('div');
  holder.style.cssText='position:fixed;left:-99999px;top:0;';
  const c=document.createElement('div');
  holder.appendChild(c);document.body.appendChild(holder);
  renderCard(i,c);
  await new Promise(r=>setTimeout(r,60));
  const canvas=await html2canvas(c,{scale:1,width:1080,height:1080,
    windowWidth:1080,windowHeight:1080,backgroundColor:null,useCORS:true});
  document.body.removeChild(holder);
  return canvas.toDataURL('image/png');
}
function trigger(data,name){
  const a=document.createElement('a');a.href=data;a.download=name;
  document.body.appendChild(a);a.click();a.remove();
}
async function downloadOne(){
  trigger(await snap(cur), `card_${String(cur+1).padStart(2,'0')}.png`);
}
function tellApp(message){
  if (window.parent !== window) window.parent.postMessage({ type:'cardnews:status', message }, '*');
}
async function downloadAll(){
  const btn = document.getElementById('dlAllBtn');
  try {
    if (window.parent !== window) {
      // 앱 안(iframe): PNG 들을 모아 앱에 zip 저장 요청 (앱이 저장 다이얼로그 표시)
      const items = [];
      for (let i=0;i<slides.length;i++) {
        if (btn) { btn.disabled = true; btn.textContent = `렌더링 ${i+1}/${slides.length}`; }
        items.push({ name:`card_${String(i+1).padStart(2,'0')}.png`, dataUrl: await snap(i) });
      }
      tellApp('전체 zip — 저장 위치를 선택하세요');
      window.parent.postMessage({ type:'cardnews:export-zip', items, name:'card-news' }, '*');
      return;
    }
    // 단독 실행(브라우저): 기존처럼 한 장씩 다운로드
    for(let i=0;i<slides.length;i++){
      trigger(await snap(i), `card_${String(i+1).padStart(2,'0')}.png`);
      await new Promise(r=>setTimeout(r,350));
    }
  } catch (e) {
    tellApp('전체 zip 실패: ' + (e && e.message || e));
    alert('전체 zip 실패: ' + (e && e.message || e));
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = '전체 zip'; }
  }
}

// ── 스티커 드래그 이동/크기조정 ──
// 카드 좌표계는 1080 기준(스케일 보정). 드래그 중엔 DOM 스타일만 갱신하고 상태는 객체에 직접 기록
// (drawCard 로 다시 그리면 잡고 있던 요소가 사라져 드래그가 끊긴다).
// dir: move(이동) | n/s/w/e(한 방향 늘리기=스트레치) | se(코너, 비율 유지 확대)
let ovDrag = null;
let txDrag = null; // 빈 페이지 텍스트 드래그 상태 (move | resize=글자 크기)
(function setupOvDrag(){
  const cardEl = $('#card');
  cardEl.addEventListener('pointerdown', (e) => {
    let ov = e.target.closest('.ov');
    let tx = e.target.closest('.tx');
    if (!ov && !tx) { // 빈 곳 클릭 → 선택 해제(가이드 숨김)
      if (ovSel >= 0 || txSel) { ovSel = -1; txSel = null; drawCard(); }
      return;
    }
    // 빈 페이지의 자유 배치 텍스트(제목/본문/핸들)
    if (tx && !ov) {
      e.preventDefault(); e.stopPropagation();
      const key = tx.dataset.tx;
      const s = slides[cur];
      s.tx = s.tx || {};
      const conf = s.tx[key] = s.tx[key] || { ...TX_DEF[key] }; // 기본값을 슬라이드에 구체화
      if (txSel !== key) { txSel = key; ovSel = -1; drawCard(); tx = cardEl.querySelector(`.tx[data-tx="${key}"]`) || tx; }
      const th = e.target.closest('.ovh');
      txDrag = { conf, el: tx, dir: th ? th.dataset.dir : 'move', sx: e.clientX, sy: e.clientY,
        ox: conf.x, oy: conf.y, osize: conf.size, ow: tx.offsetWidth, oh: tx.offsetHeight };
      return;
    }
    const k = +ov.dataset.ov;
    const o = ovList(cur)[k]; if (!o) return;
    e.preventDefault(); e.stopPropagation();
    if (ovSel !== k) { // 이미지 클릭 → 선택(가이드 표시). 다시 그려지므로 요소를 재조회해 드래그 이어감
      ovSel = k; txSel = null; drawCard();
      ov = cardEl.querySelector(`.ov[data-ov="${k}"]`) || ov;
    }
    const h = e.target.closest('.ovh');
    const dir = h ? h.dataset.dir : 'move';
    // 높이가 auto(비율 유지)였던 이미지는 offsetHeight 가 1080 좌표계의 실제 높이
    ovDrag = { o, el: ov, dir, sx: e.clientX, sy: e.clientY, ox: o.x, oy: o.y, ow: o.w, oh: o.h || ov.offsetHeight };
    if (dir !== 'move' && dir !== 'se' && !o.h) {
      // 한 방향 늘리기 시작 → 높이를 고정값으로 전환(아니면 폭 변경 시 비율 따라 높이도 변함)
      o.h = ovDrag.oh;
      const im = ov.querySelector('img'); if (im) { im.style.height = '100%'; im.style.objectFit = 'fill'; }
      ov.style.height = o.h + 'px';
    }
  });
  // 클릭이 frame 의 openDrawer 로 번지지 않게 (드래그 후 의도치 않은 드로어 토글 방지)
  cardEl.addEventListener('click', (e) => { if (e.target.closest('.ov')) e.stopPropagation(); });
  // 이미지 밖 어디를 눌러도(카드 옆 여백, 드로어 등) 선택 해제.
  // 단, 드로어의 이미지 컨트롤(.ov-row: 모서리 슬라이더/배경으로/삭제)은 예외.
  // (.ov 클릭은 위 핸들러가 stopPropagation 하므로 여기 안 옴)
  document.addEventListener('pointerdown', (e) => {
    if (ovSel < 0 && !txSel) return;
    if (e.target.closest('.ov') || e.target.closest('.ov-row') || e.target.closest('.tx')) return;
    ovSel = -1; txSel = null; drawCard();
  });
  // Delete/Backspace: 선택된 텍스트(제목/본문/핸들)나 이미지를 삭제 — 편집창에 다시 쓰면 복귀.
  // 드로어 입력칸에서 타이핑 중일 때는 동작하지 않음.
  document.addEventListener('keydown', (e) => {
    if (e.key !== 'Delete' && e.key !== 'Backspace') return;
    if (!txSel && ovSel < 0) return;
    const t = e.target;
    if (t && (t.tagName === 'INPUT' || t.tagName === 'TEXTAREA' || t.isContentEditable)) return;
    e.preventDefault();
    const s = slides[cur];
    if (txSel === 'headline') s.headline = '';
    else if (txSel === 'body') s.body = '';
    else if (txSel === 'handle') s.hideHandle = true; // 이 슬라이드에서만 숨김 — 핸들칸에 타이핑하면 복귀
    else if (ovSel >= 0) { const r = ovRef(ovSel); r.arr.splice(r.idx, 1); }
    txSel = null; ovSel = -1; draw();
  });
  window.addEventListener('pointermove', (e) => {
    if (txDrag) { // 빈 페이지 텍스트: 이동 / 핸들(상하좌우·코너) 어느 쪽을 끌어도 글자 크기 비례 조절
      const scale = $('#frame').clientWidth / 1080;
      const dx = (e.clientX - txDrag.sx) / scale, dy = (e.clientY - txDrag.sy) / scale;
      const d = txDrag, c = d.conf, st = d.el.style;
      if (d.dir === 'move') {
        c.x = Math.round(d.ox + dx); c.y = Math.round(d.oy + dy);
        st.left = c.x + 'px'; st.top = c.y + 'px';
      } else {
        // 중심에서 멀어지는 방향으로 끌면 커지고 가까워지면 작아진다
        let f = 1;
        if (d.dir === 'e' || d.dir === 'se') f = (d.ow + dx) / d.ow;
        else if (d.dir === 'w') f = (d.ow - dx) / d.ow;
        else if (d.dir === 's') f = (d.oh + dy) / d.oh;
        else if (d.dir === 'n') f = (d.oh - dy) / d.oh;
        c.size = Math.max(12, Math.round(d.osize * f));
        st.fontSize = c.size + 'px';
      }
      return;
    }
    if (!ovDrag) return;
    const scale = $('#frame').clientWidth / 1080;
    const dx = (e.clientX - ovDrag.sx) / scale, dy = (e.clientY - ovDrag.sy) / scale;
    const d = ovDrag, o = d.o, st = d.el.style;
    if (d.dir === 'move') {
      o.x = Math.round(d.ox + dx); o.y = Math.round(d.oy + dy);
      st.left = o.x + 'px'; st.top = o.y + 'px';
    } else if (d.dir === 'e') {
      o.w = Math.max(60, Math.round(d.ow + dx)); st.width = o.w + 'px';
    } else if (d.dir === 'w') {
      o.w = Math.max(60, Math.round(d.ow - dx)); o.x = d.ox + (d.ow - o.w);
      st.width = o.w + 'px'; st.left = o.x + 'px';
    } else if (d.dir === 's') {
      o.h = Math.max(60, Math.round(d.oh + dy)); st.height = o.h + 'px';
    } else if (d.dir === 'n') {
      o.h = Math.max(60, Math.round(d.oh - dy)); o.y = d.oy + (d.oh - o.h);
      st.height = o.h + 'px'; st.top = o.y + 'px';
    } else if (d.dir === 'se') { // 비율 유지 확대/축소
      o.w = Math.max(60, Math.round(d.ow + dx));
      st.width = o.w + 'px';
      if (o.h) { o.h = Math.max(60, Math.round(d.oh * o.w / d.ow)); st.height = o.h + 'px'; }
    }
  });
  window.addEventListener('pointerup', () => { if (ovDrag || txDrag) { ovDrag = null; txDrag = null; drawCard(); } });
})();

// ── 앱(부모 창)과의 postMessage 연동 — AI 자동 생성이 슬라이드/배경을 주입 ──
window.addEventListener('message', (e) => {
  const d = e.data || {};
  if (d.type === 'cardnews:set-slides' && Array.isArray(d.slides) && d.slides.length) {
    slides = d.slides.map((s) => ({
      type: ['cover','outro','blank','duo'].indexOf(s.type) >= 0 ? s.type : 'tip',
      kicker: s.kicker || '', headline: s.headline || '', body: s.body || '',
      items: Array.isArray(s.items) ? s.items.slice(0,2).map((o)=>({
        n: o.n != null ? String(o.n) : '', title: o.title || '', desc: o.desc || '', img: o.img || undefined
      })) : undefined
    }));
    if (d.handle) { handle = String(d.handle); const h = $('#handle'); if (h) h.value = handle; }
    cur = 0; draw();
    d.slides.forEach((s, i) => { if (s.bg) setSlideBg(slides[i], s.bg); });
  } else if (d.type === 'cardnews:set-bg' && typeof d.index === 'number' && slides[d.index]) {
    if (d.dataUrl) setSlideBg(slides[d.index], d.dataUrl);
    else { delete slides[d.index].bg; delete slides[d.index].bgLight; draw(); }
  } else if (d.type === 'cardnews:set-item-img' && typeof d.index === 'number' && slides[d.index]
      && slides[d.index].items && slides[d.index].items[d.item]) {
    slides[d.index].items[d.item].img = d.dataUrl || undefined;
    if (d.index === cur) draw(); // 보고 있는 카드면 즉시 반영
    else scheduleSave();
  } else if (d.type === 'cardnews:gallery-list') {
    galShow(Array.isArray(d.items) ? d.items : []);
  } else if (d.type === 'cardnews:gallery-image' && d.dataUrl) {
    const t = d.target || 'sticker';
    if (t === 'bg') setSlideBg(slides[cur], d.dataUrl);
    else if (t === 'item0' || t === 'item1') { updItem(+t.slice(4), 'img', d.dataUrl); buildEditor(); }
    else addSticker(d.dataUrl);
  }
});
try { if (window.parent !== window) window.parent.postMessage({ type: 'cardnews:ready' }, '*'); } catch (e) {}

window.addEventListener('resize',fitScaler);
injectFonts();
// 자동 저장된 덱 복원 후 첫 렌더 (없으면 기본 덱)
loadState().then((st) => {
  if (st && Array.isArray(st.slides) && st.slides.length) {
    slides = st.slides;
    handle = st.handle || handle;
    accent = st.accent || accent;
    bgColor = st.bgColor || bgColor;
    handleColor = st.handleColor || '';
    if (st.elFont) Object.assign(elFont, st.elFont);
    if (st.elSize) Object.assign(elSize, st.elSize);
    gImgs = Array.isArray(st.gImgs) ? st.gImgs : [];
    ovAll = !!st.ovAll;
    cur = Math.min(st.cur || 0, slides.length - 1);
    const h = $('#handle'); if (h) h.value = handle;
  }
  buildColorChips(); buildFontSelect(); draw();
});
document.fonts.ready.then(()=>drawCard());
</script>
</body>
</html>
