<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>영상제안서 만들기 — TB MULTY TOOL</title>

<!-- Tailwind (Play CDN) -->
<script src="https://cdn.tailwindcss.com"></script>
<!-- React + ReactDOM -->
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<!-- Babel (JSX in-browser) -->
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<!-- Lucide icons -->
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>

<style>
  /* ── Paperlogy 폰트 (Thin~Black) ── */
  @font-face { font-family: 'Paperlogy'; font-weight: 100; font-display: swap; src: url('/fonts/Paperlogy-1Thin.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 200; font-display: swap; src: url('/fonts/Paperlogy-2ExtraLight.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 300; font-display: swap; src: url('/fonts/Paperlogy-3Light.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 400; font-display: swap; src: url('/fonts/Paperlogy-4Regular.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 500; font-display: swap; src: url('/fonts/Paperlogy-5Medium.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 600; font-display: swap; src: url('/fonts/Paperlogy-6SemiBold.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 700; font-display: swap; src: url('/fonts/Paperlogy-7Bold.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 800; font-display: swap; src: url('/fonts/Paperlogy-8ExtraBold.ttf') format('truetype'); }
  @font-face { font-family: 'Paperlogy'; font-weight: 900; font-display: swap; src: url('/fonts/Paperlogy-9Black.ttf') format('truetype'); }

  html, body, #root { height: 100%; }
  body {
    margin: 0;
    font-family: 'Paperlogy', 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', sans-serif;
    background: #f8fafc;
    color: #0f172a;
  }
  /* 전체 요소를 Paperlogy로 강제 (아이콘 svg 제외) — 프롬프트/모노 블록 포함 전부 통일 */
  body, body *:not(svg):not(path):not(i) { font-family: 'Paperlogy', 'Pretendard', -apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', sans-serif !important; }

  /* ── KT brand tokens ─────────────────────────────────── */
  :root {
    --kt-navy: #0E1B45;
    --kt-navy-strong: #081231;
    --kt-ink: #191919;
    --kt-gray: #F4F4F6;
    --kt-line: #E5E5EA;
  }

  /* ── KT-style GNB ────────────────────────────────────── */
  .kt-gnb {
    position: sticky; top: 0; z-index: 50;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--kt-line);
  }
  .kt-gnb-inner {
    max-width: 1440px; margin: 0 auto;
    height: 64px; padding: 0 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .kt-logo { display: flex; align-items: center; gap: 10px; }
  .kt-logo-mark {
    display: inline-flex; align-items: center; justify-content: center;
    height: 30px; padding: 0 9px; border-radius: 7px;
    background: var(--kt-navy); color: #fff;
    font-size: 16px; font-weight: 900; letter-spacing: -0.02em;
    box-shadow: 0 4px 12px rgba(14,27,69,0.28);
  }
  .kt-logo-text {
    font-size: 17px; font-weight: 800; color: var(--kt-ink); letter-spacing: -0.01em;
  }
  .kt-logo-text b { color: var(--kt-navy); font-weight: 800; }
  .kt-gnb-actions { margin-left: auto; display: flex; align-items: center; gap: 8px; }
  .kt-btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 18px; border-radius: 6px;
    background: var(--kt-navy); color: #fff; font-size: 14px; font-weight: 700;
    box-shadow: 0 8px 18px rgba(14,27,69,0.24);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .kt-btn-primary:hover { background: var(--kt-navy-strong); transform: translateY(-1px); box-shadow: 0 12px 24px rgba(14,27,69,0.32); }
  .kt-btn-primary:active { transform: translateY(1px) scale(0.98); }
  .kt-btn-ghost {
    display: inline-flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 14px; border-radius: 6px;
    background: #fff; color: #4b4b50; border: 1px solid var(--kt-line);
    font-size: 14px; font-weight: 700;
    transition: background 0.2s, border-color 0.2s, color 0.2s;
  }
  .kt-btn-ghost:hover { background: var(--kt-gray); color: var(--kt-ink); }

  /* ── Center nav + dropdown menus ─────────────────────── */
  .kt-nav { display: none; align-items: center; gap: 4px; margin-left: 18px; }
  @media (min-width: 900px) { .kt-nav { display: flex; } }
  .kt-nav-item { position: relative; }
  .kt-nav-link {
    display: inline-flex; align-items: center; gap: 5px;
    height: 64px; padding: 0 16px;
    font-size: 15px; font-weight: 700; color: #2a2a30;
    background: none; border: none; cursor: pointer;
    transition: color 0.2s;
  }
  .kt-nav-link:hover { color: var(--kt-navy); }
  .kt-nav-link svg { transition: transform 0.2s; opacity: 0.6; }
  .kt-nav-item:hover .kt-nav-link svg { transform: rotate(180deg); }
  .kt-dropdown {
    position: absolute; top: 60px; left: 50%; transform: translateX(-50%) translateY(8px);
    min-width: 188px; padding: 8px;
    background: #fff; border: 1px solid var(--kt-line); border-radius: 12px;
    box-shadow: 0 18px 40px rgba(14,27,69,0.16);
    opacity: 0; visibility: hidden; pointer-events: none;
    transition: opacity 0.18s, transform 0.18s, visibility 0.18s;
    z-index: 60;
  }
  .kt-nav-item:hover .kt-dropdown {
    opacity: 1; visibility: visible; pointer-events: auto;
    transform: translateX(-50%) translateY(0);
  }
  .kt-dropdown a {
    display: flex; align-items: center; gap: 9px;
    padding: 9px 12px; border-radius: 8px;
    font-size: 14px; font-weight: 600; color: #3a3a42; white-space: nowrap;
    transition: background 0.15s, color 0.15s;
  }
  .kt-dropdown a:hover { background: var(--kt-gray); color: var(--kt-navy); }
  .kt-dropdown a svg { width: 16px; height: 16px; color: var(--kt-navy); flex-shrink: 0; }

  /* ── Pills (outline + filled, KT navy) ───────────────── */
  .kt-btn-outline {
    display: inline-flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 16px; border-radius: 8px;
    background: #fff; color: var(--kt-navy); border: 1.5px solid var(--kt-navy);
    font-size: 14px; font-weight: 700;
    transition: background 0.2s, color 0.2s, transform 0.15s;
  }
  .kt-btn-outline:hover { background: var(--kt-navy); color: #fff; transform: translateY(-1px); }
  .kt-btn-pill {
    display: inline-flex; align-items: center; gap: 6px;
    height: 40px; padding: 0 18px; border-radius: 8px;
    background: var(--kt-navy); color: #fff; font-size: 14px; font-weight: 700;
    box-shadow: 0 8px 18px rgba(14,27,69,0.24);
    transition: background 0.2s, transform 0.15s, box-shadow 0.2s;
  }
  .kt-btn-pill:hover { background: var(--kt-navy-strong); transform: translateY(-1px); box-shadow: 0 12px 24px rgba(14,27,69,0.32); }
  .kt-btn-pill:active { transform: translateY(1px) scale(0.98); }
  .kt-icon-btn {
    display: inline-flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
    width: 52px; height: 48px; border-radius: 8px;
    background: none; border: 1px solid var(--kt-line); color: #4b4b50; cursor: pointer;
    font-size: 10px; font-weight: 600;
    transition: background 0.18s, color 0.18s, border-color 0.18s;
  }
  .kt-icon-btn:hover { background: var(--kt-gray); color: var(--kt-navy); border-color: #c9cdd6; }

  /* ── Dark navy hero (title band) ─────────────────────── */
  .kt-hero-dark {
    position: relative; overflow: hidden;
    background: linear-gradient(120deg, #0a1430 0%, #0e1b45 55%, #16285f 100%);
    padding: 18px 20px 20px;
  }
  .kt-hero-dark::after {
    content: ''; position: absolute; top: -60px; right: -40px; width: 320px; height: 320px;
    background: radial-gradient(circle, rgba(80,120,220,0.22), transparent 62%);
    pointer-events: none;
  }
  .kt-hero-inner { position: relative; z-index: 2; max-width: 1440px; margin: 0 auto; }
  .kt-eyebrow {
    display: inline-flex; align-items: center; gap: 8px;
    font-size: 11px; font-weight: 800; letter-spacing: 0.22em;
    text-transform: uppercase; color: #9db4ec;
  }
  .kt-eyebrow::before { content: ''; width: 18px; height: 2px; background: #5e7fd6; border-radius: 2px; }
  .kt-title {
    margin: 7px 0 0; font-size: clamp(24px, 4vw, 34px);
    font-weight: 900; letter-spacing: -0.02em; color: #fff; line-height: 1.12;
  }
  .kt-title-sub { margin-top: 6px; font-size: 13.5px; color: #b9c4e0; font-weight: 500; }

  /* ── Primary / ghost pills (KT red) ──────────────────── */
  .tb-pill-primary {
    background: var(--kt-navy); color: #fff; border: 1px solid var(--kt-navy);
    box-shadow: 0 8px 18px rgba(14,27,69,0.22);
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.6), box-shadow 0.25s, background 0.2s;
  }
  .tb-pill-primary:hover {
    background: var(--kt-navy-strong);
    transform: translateY(-1px) scale(1.02);
    box-shadow: 0 12px 24px rgba(14,27,69,0.3);
  }
  .tb-pill-primary:active {
    transform: translateY(1px) scale(0.95);
    box-shadow: 0 3px 8px rgba(14,27,69,0.22);
    transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
  }
  .tb-pill-ghost {
    background: #fff; color: #4b4b50; border: 1px solid var(--kt-line);
    box-shadow: 0 2px 6px rgba(25,25,25,0.04);
    transition: transform 0.3s cubic-bezier(0.175,0.885,0.32,1.6), box-shadow 0.25s, background 0.2s;
  }
  .tb-pill-ghost:hover { background: var(--kt-gray); transform: translateY(-1px) scale(1.02); }
  .tb-pill-ghost:active { transform: translateY(1px) scale(0.96); }

  /* ── Press feedback ──────────────────────────────────── */
  .tb-press {
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 2), box-shadow 0.25s, background 0.25s, opacity 0.2s;
    transform-origin: center; will-change: transform;
  }
  .tb-press:hover { transform: translateY(-1.5px) scale(1.035); box-shadow: 0 10px 22px rgba(15, 23, 42, 0.18); }
  .tb-press:active {
    transform: translateY(1px) scale(0.93);
    box-shadow: 0 2px 6px rgba(15, 23, 42, 0.12), inset 0 2px 4px rgba(0, 0, 0, 0.18);
    transition: transform 0.08s ease-out, box-shadow 0.08s ease-out; opacity: 0.92;
  }
  .tb-press-soft {
    transition: transform 0.35s cubic-bezier(0.175, 0.885, 0.32, 2), box-shadow 0.25s, background 0.2s;
    transform-origin: center; will-change: transform;
  }
  .tb-press-soft:hover { transform: translateY(-1px) scale(1.03); }
  .tb-press-soft:active {
    transform: translateY(0.5px) scale(0.94);
    box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.12);
    transition: transform 0.08s ease-out, box-shadow 0.08s ease-out;
  }

  /* 앱 임베드: 상단 히어로 배너 + 프로젝트 정보 사이드바 숨김 */
  .kt-hero-dark { display: none !important; }
  aside { display: none !important; }

  /* ===== 다크 테마 통일 (앱 색상과 동일: bg #0f1115 / surface #181b22 / border #2c313c / text #e6e9ef / primary #4f8cff) ===== */
  body { background: #0f1115 !important; color: #e6e9ef !important; }
  .kt-gnb { background: rgba(24,27,34,0.92) !important; border-bottom-color: #2c313c !important; }

  /* Tailwind 임의색 클래스 → 다크 매핑 */
  [class*="bg-white"]        { background-color: #181b22 !important; }
  [class*="bg-[#f8fafc]"]    { background-color: #0f1115 !important; }
  [class*="bg-[#f1f5f9]"]    { background-color: #20242d !important; }
  [class*="bg-[#eef2fb]"]    { background-color: #20242d !important; }
  [class*="text-[#0f172a]"]  { color: #e6e9ef !important; }
  [class*="text-[#0E1B45]"]  { color: #e6e9ef !important; }
  [class*="text-[#334155]"]  { color: #d4dae4 !important; }
  [class*="text-[#475569]"]  { color: #c8cfd9 !important; }
  [class*="text-[#64748b]"]  { color: #a6aebc !important; }
  [class*="text-[#94a3b8]"]  { color: #9aa3b2 !important; }
  [class*="border-[#e2e8f0]"]{ border-color: #2c313c !important; }
  [class*="border-[#cbd5e1]"]{ border-color: #2c313c !important; }
  [class*="bg-[#e2e8f0]"]    { background-color: #20242d !important; }
  [class*="hover:bg-[#e2e8f0]"]:hover { background-color: #2c313c !important; }

  /* 색상 섹션 헤더(크림/하늘/빨강 띠) + 그 텍스트 → 다크 톤 + 가독성 */
  [class*="bg-[#fefce8]"], [class*="bg-[#fffbeb]"], [class*="bg-[#fff7ed]"] { background-color: #2a2613 !important; }
  [class*="bg-[#ecfeff]"], [class*="bg-[#eff6ff]"], [class*="bg-[#f0f9ff]"] { background-color: #11272f !important; }
  [class*="bg-[#fee2e2]"], [class*="bg-[#fef2f2]"] { background-color: #2a1517 !important; }
  [class*="text-[#a16207]"], [class*="text-[#fbbf24]"], [class*="text-[#b45309]"] { color: #fbbf24 !important; }
  [class*="text-[#0891b2]"], [class*="text-[#0e7490]"] { color: #38bdf8 !important; }
  [class*="text-[#dc2626]"], [class*="text-[#b91c1c]"] { color: #f87171 !important; }
  [class*="text-[#16a34a]"], [class*="text-[#15803d]"] { color: #4ade80 !important; }
  [class*="border-[#fde68a]"] { border-color: #4d3f17 !important; }
  [class*="border-[#a5f3fc]"] { border-color: #164e5b !important; }
  [class*="border-[#fca5a5]"] { border-color: #5b2b2e !important; }
  [class*="border-[#0E1B45]"] { border-color: #3a4150 !important; }

  /* 입력 요소 */
  input, textarea, select { background-color: #20242d !important; color: #e6e9ef !important; border-color: #2c313c !important; }
  input::placeholder, textarea::placeholder { color: #6b7280 !important; }

  /* 버튼/필 → 다크 + 앱 블루 액센트 */
  .kt-btn-pill { background: #20242d !important; color: #e6e9ef !important; border: 1px solid #2c313c !important; box-shadow: none !important; }
  .kt-btn-pill:hover { background: #2c313c !important; }
  .kt-icon-btn { background: #20242d !important; color: #9aa3b2 !important; border-color: #2c313c !important; }
  .kt-icon-btn:hover { background: #2c313c !important; color: #e6e9ef !important; border-color: #3a4150 !important; }
  .tb-pill-primary { background: #4f8cff !important; border-color: #4f8cff !important; color: #fff !important; box-shadow: none !important; }
  .tb-pill-primary:hover { background: #3b73d8 !important; }
  .tb-pill-ghost { background: #20242d !important; color: #e6e9ef !important; border-color: #2c313c !important; box-shadow: none !important; }
  .tb-pill-ghost:hover { background: #2c313c !important; }

  /* 인디고(#6366f1) 액센트 → 앱 블루(#4f8cff) */
  [class*="bg-[#6366f1]"] { background-color: #4f8cff !important; }
  [class*="hover:bg-[#4f46e5]"]:hover { background-color: #3b73d8 !important; }
  [class*="border-[#6366f1]"], [class*="focus:border-[#6366f1]"]:focus { border-color: #4f8cff !important; }
  [class*="text-[#6366f1]"] { color: #6ea0ff !important; }
</style>

<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ── 보드별 생성 미디어 영구 저장 (IndexedDB — 영상도 커서 localStorage 대신 사용) ──
const MEDIA_DB = 'avs-media';
function idbOpen(){ return new Promise((res, rej) => { const r = indexedDB.open(MEDIA_DB, 1); r.onupgradeneeded = () => r.result.createObjectStore('boards'); r.onsuccess = () => res(r.result); r.onerror = () => rej(r.error); }); }
async function idbSet(key, val){ try { const db = await idbOpen(); await new Promise((res, rej) => { const tx = db.transaction('boards','readwrite'); tx.objectStore('boards').put(val, key); tx.oncomplete = res; tx.onerror = () => rej(tx.error); }); } catch(e){} }
async function idbGet(key){ try { const db = await idbOpen(); return await new Promise((res) => { const tx = db.transaction('boards','readonly'); const rq = tx.objectStore('boards').get(key); rq.onsuccess = () => res(rq.result); rq.onerror = () => res(null); }); } catch(e){ return null; } }
async function idbClearAll(){ try { const db = await idbOpen(); await new Promise((res) => { const tx = db.transaction('boards','readwrite'); tx.objectStore('boards').clear(); tx.oncomplete = res; tx.onerror = res; }); } catch(e){} }

/* ──────────────────────────────────────────────────────────
   Lucide icon wrapper — reads icon node data from the UMD build
   and renders an inline SVG, forwarding className/style.
─────────────────────────────────────────────────────────── */
function getIconNode(name) {
  const L = window.lucide || {};
  const n = (L.icons && L.icons[name]) || L[name];
  return Array.isArray(n) ? n : null;
}
function LIcon({ name, className, style }) {
  const node = getIconNode(name);
  if (!node) return null;
  return (
    <svg
      className={className}
      style={style}
      viewBox="0 0 24 24"
      fill="none"
      stroke="currentColor"
      strokeWidth={2}
      strokeLinecap="round"
      strokeLinejoin="round"
    >
      {node.map((child, i) => React.createElement(child[0], { ...child[1], key: i }))}
    </svg>
  );
}
const mk = (name) => (props) => <LIcon name={name} {...props} />;
const ArrowLeft = mk('ArrowLeft');
const ChevronDown = mk('ChevronDown');
const Upload = mk('Upload');
const Copy = mk('Copy');
const ExternalLink = mk('ExternalLink');
const Gem = mk('Gem');
const X = mk('X');
const Clapperboard = mk('Clapperboard');
const ImageIcon = mk('Image');
const Film = mk('Film');
const MessageSquare = mk('MessageSquare');
const Music = mk('Music');
const Scissors = mk('Scissors');
const Droplets = mk('Droplets');
const Wrench = mk('Wrench');
const Trash2 = mk('Trash2');
const Languages = mk('Languages');
const Camera = mk('Camera');
const Layers = mk('Layers');
const Sparkles = mk('Sparkles');
const ScrollText = mk('ScrollText');
const Clock = mk('Clock');
const FileText = mk('FileText');

/* ──────────────────────────────────────────────────────────
   Storyboard JSON v6 → Master Prompt Serializer
   (Visual-only: music & SFX only, no narration/dialogue/tagline)
─────────────────────────────────────────────────────────── */
function hdr(s) { return `[${s}]`; }
function panelLine(panel) {
  const dur = panel.duration_seconds ? ` (${panel.duration_seconds}s)` : '';
  return `${panel.number}. ${panel.timecode}${dur} — ${panel.image_prompt_en}`;
}
function pacingString(panels) {
  return panels.map(p => p.duration_seconds || '?').join('-');
}
function serializeBoardToPrompt(board, data) {
  const { project, scene, mode, consistency_lock, bridge_frame } = data;
  const isModeB = mode === 'B';
  const panelCount = board.panels.length;
  const gridLayout = panelCount === 12 ? '6 × 2 grid' : '3 × 2 grid';

  const boardLabel = board.label || 'A';
  const titleSuffix = board.title_suffix ? ` — ${board.title_suffix}` : '';
  const titleLine = `${project.title}${titleSuffix}`;
  const boardDuration = board.duration_seconds || 10;
  const pacing = pacingString(board.panels);

  const out = [];

  if (isModeB) {
    out.push(`Create a single premium cinematic ${panelCount}-panel director storyboard presentation board, BOARD ${boardLabel}.`);
    out.push(`A professional film director's pitch-deck sheet, NOT a comic page.`);
    out.push(`This board covers ${boardDuration} seconds (pacing ${pacing}) of a continuous ${project.total_duration_seconds}-second cinematic sequence.`);
  } else {
    out.push(`Create a single premium cinematic ${panelCount}-panel director storyboard presentation board (${boardDuration} SECONDS, mixed pacing ${pacing}).`);
    out.push(`A professional film director's pitch-deck sheet, NOT a comic page.`);
  }
  out.push('');

  out.push(hdr('TOP HEADER'));
  const partLabel = isModeB ? `BOARD ${boardLabel} OF 2` : `BOARD ${boardLabel} OF 1`;
  out.push(`PROJECT TITLE: ${titleLine}    PART: ${partLabel}    DURATION: ${boardDuration} SECONDS`);
  const toneStr = Array.isArray(project.tone) ? project.tone.join(' • ') : (project.tone || '');
  out.push(`GENRE: ${project.genre}    TONE: ${toneStr}    PACING: ${pacing}`);
  out.push('');

  out.push(hdr('LEFT ZONE'));
  out.push(`SCENE TITLE: ${scene.title}${titleSuffix}`);
  out.push(`LOGLINE: ${scene.logline}`);
  out.push(`SCENE OVERVIEW:`);
  const ov = scene.overview || {};
  out.push(`  LOCATION: ${ov.location || ''}`);
  out.push(`  TIME: ${ov.time || ''}`);
  out.push(`  LIGHTING: ${ov.lighting || ''}`);
  out.push(`  MOOD: ${ov.mood || ''}`);
  out.push(`  SOUND THEME: ${ov.sound_theme || ''}`);
  out.push(`  DIALOGUE: ${ov.dialogue || 'None (Music & SFX only)'}`);
  out.push(`  TRANSITION STYLE: ${ov.transition_style || ''}`);
  out.push('');

  out.push(hdr('CENTER HERO FRAME'));
  out.push(board.main_frame?.prompt_en || '');
  out.push('');

  out.push(`[RIGHT ZONE: TOTAL DURATION ${project.total_duration_seconds} SECONDS / ${panelCount} PANELS]`);
  out.push('');

  out.push(`[${panelCount} PANELS — ${gridLayout}]`);
  for (const panel of board.panels) out.push(panelLine(panel));
  out.push('');
  out.push(`Each panel includes 4 small-cap labels:`);
  out.push(`ACTION / VISUAL  •  CAMERA / MOVEMENT  •  SOUND / DIALOGUE (music & SFX only)  •  TRANSITION`);

  out.push('');
  out.push(hdr('BOTTOM'));
  out.push(`NOTES FOR PRODUCTION:`);
  for (const note of (board.production_notes || [])) out.push(`- ${note}`);
  out.push('');
  out.push(`VISUAL REFERENCES & MOODBOARD: ${(board.moodboard_keywords || []).join(', ')}.`);
  out.push('');

  const tokens = data.production?.design_tokens || {};
  out.push(hdr('DESIGN STYLE'));
  out.push(`Dark luxury director-board, charcoal background (${tokens.color_background_primary || '#0A0A0A'} / ${tokens.color_background_secondary || '#1A1A1A'}),`);
  out.push(`gold accents (${tokens.color_accent_gold || '#C9A96E'}), off-white type (${tokens.color_text_primary || '#F5F0E6'}),`);
  out.push(`elegant serif headlines, small-cap labels, thin gold dividers,`);
  out.push(`magazine-spread quality, no comic style, no random text, no real-world brand logos.`);
  out.push('');

  out.push(hdr('VISUAL STYLE'));
  out.push(`Cinematic realistic, high contrast lighting, shallow depth of field,`);
  out.push(`filmic color grading, anamorphic flare, atmospheric highlights,`);
  out.push(`${(project.genre || '').toLowerCase()} look, consistent subject/lighting/palette across all ${panelCount} panels.`);

  if (isModeB && bridge_frame && consistency_lock) {
    out.push('');
    out.push(hdr('CONSISTENCY LOCK (byte-identical across both boards)'));
    out.push(`SUBJECT: ${consistency_lock.subject_en}`);
    out.push(`SETTING: ${consistency_lock.setting_en}`);
    out.push(`LIGHTING: ${consistency_lock.lighting_en}`);
    out.push(`BGM POLICY: ${consistency_lock.bgm_policy}`);
    if (boardLabel === 'A') out.push(`→ Continues to Board B. Bridge: ${bridge_frame.summary || ''}`);
    else out.push(`← Continues from Board A. Starts from: ${bridge_frame.summary || ''}`);
  }

  out.push('');
  out.push(`Aspect ratio ${data.production?.aspect_ratio || '16:9'}. Ultra-detailed, magazine-spread quality.`);

  return out.join('\n');
}
function serializeAllBoards(data) {
  return data.boards.map((board) => ({
    board_label: board.label,
    title: `${data.project.title}${board.title_suffix ? ' — ' + board.title_suffix : ''} (Board ${board.label})`,
    prompt: serializeBoardToPrompt(board, data),
  }));
}

const CACHE_KEY = 'toolb_step7_cinematic_v6';

const FUNCTION_LABEL = {
  establishing: '오프닝',
  character_intro: '인물 소개',
  inciting_action: '발단',
  macro_detail: '디테일',
  texture_beauty: '텍스처',
  interaction: '상호작용',
  emotional_beat: '감정',
  abstract_motif: '모티프',
  wide_climax_build: '빌드업',
  hero_climax: '클라이맥스',
  resolution: '레졸루션',
  brand_reveal: '브랜드',
  bridge_frame_end: '브릿지 끝',
  bridge_frame_start: '브릿지 시작',
};

const BOARD_DOT = { A: '#0ea5e9', B: '#8b5cf6' };

function cleanJson(raw) {
  const cleaned = String(raw || '').trim()
    .replace(/^```(?:json|JSON)?\s*\n?/gm, '')
    .replace(/\n?```\s*$/gm, '')
    .trim();
  if (!cleaned) throw new Error('JSON 내용을 입력해주세요.');
  try {
    return JSON.parse(cleaned);
  } catch (e) {
    throw new Error(`JSON 파싱 오류: ${e.message}`);
  }
}

function unwrapDoc(json) {
  if (json && typeof json === 'object' && (json.boards || json.scene || json.project)) return json;
  if (json && typeof json === 'object') {
    for (const key of Object.keys(json)) {
      if (key.startsWith('example_') && json[key]?.boards) return json[key];
    }
  }
  return json;
}

function parsePanel(p, pi) {
  return {
    number: typeof p.number === 'number' ? p.number : pi + 1,
    timecode: p.timecode || '',
    duration_seconds: typeof p.duration_seconds === 'number' ? p.duration_seconds : 0,
    function: p.function || '',
    is_bridge: !!p.is_bridge,
    image_prompt_en: p.image_prompt_en || '',
    labels: {
      action_visual: p.labels?.action_visual || '',
      camera_movement: p.labels?.camera_movement || '',
      sound_dialogue: p.labels?.sound_dialogue || '',
      transition: p.labels?.transition || '',
    },
  };
}

function parseV6(raw) {
  let json = cleanJson(raw);
  json = unwrapDoc(json);

  if (!json || typeof json !== 'object') throw new Error('JSON 객체가 아닙니다.');
  if (!Array.isArray(json.boards) || json.boards.length === 0) throw new Error('boards 배열이 필요합니다 (1~2개).');
  if (!json.project) throw new Error('project 객체가 필요합니다.');
  if (!json.scene) throw new Error('scene 객체가 필요합니다.');

  const mode = json.mode === 'B' ? 'B' : 'A';

  const boards = json.boards.map((b, i) => ({
    label: b.label || (i === 0 ? 'A' : 'B'),
    title_suffix: b.title_suffix || '',
    duration_seconds: typeof b.duration_seconds === 'number' ? b.duration_seconds : 10,
    main_frame: { prompt_en: b.main_frame?.prompt_en || '' },
    panels: (Array.isArray(b.panels) ? b.panels : []).map(parsePanel),
    production_notes: Array.isArray(b.production_notes) ? b.production_notes : [],
    moodboard_keywords: Array.isArray(b.moodboard_keywords) ? b.moodboard_keywords : [],
  }));

  return {
    version: json.version || '6.0',
    mode,
    project: json.project,
    scene: json.scene,
    consistency_lock: json.consistency_lock || null,
    bridge_frame: json.bridge_frame || null,
    boards,
    production: json.production || null,
    grok_workflow: json.grok_workflow || null,
  };
}

                placeholder='{"version": "6.0", "mode": "A|B", "project": {...}, "scene": {...}, "boards": [...]}'
              />

                  {uploadError}
                </div>
              )}
            </div>
            <div className="flex justify-end gap-2 px-5 py-3 border-t border-[#e2e8f0]">
              <button onClick={() => setUploadOpen(false)} className="px-4 py-1.5 rounded-lg tb-pill-ghost text-sm font-bold transition">취소</button>
              <button onClick={loadJson} className="px-4 py-1.5 rounded-lg tb-pill-primary text-sm font-bold transition">불러오기</button>
            </div>

          {toast}
        </div>
      )}
    </div>
  );
}

function MusicView({ data }) {
  const [mode, setMode] = useState('simple'); // simple | advanced
  const [description, setDescription] = useState('');
  const [instrumental, setInstrumental] = useState(true);
  const [style, setStyle] = useState('');
  const [lyrics, setLyrics] = useState('');
  const [title, setTitle] = useState('');
  const [genState, setGenState] = useState('idle'); // idle | generating | done | error
  const [genMsg, setGenMsg] = useState('');
  const [tracks, setTracks] = useState([]); // [{ id, url, filename }]

  useEffect(() => {
    idbGet('music').then((v) => {
      if (!v) return;
      if (Array.isArray(v.tracks)) setTracks(v.tracks);
      if (v.mode) setMode(v.mode);
      if (typeof v.description === 'string') setDescription(v.description);
      if (typeof v.style === 'string') setStyle(v.style);
      if (typeof v.lyrics === 'string') setLyrics(v.lyrics);
      if (typeof v.title === 'string') setTitle(v.title);
      if (typeof v.instrumental === 'boolean') setInstrumental(v.instrumental);
    });
  }, []);
  useEffect(() => {
    idbSet('music', { tracks, mode, description, instrumental, style, lyrics, title });
  }, [tracks, mode, description, instrumental, style, lyrics, title]);

  useEffect(() => {
    const onMsg = (e) => {
      const m = e.data;
      if (!m || m.source !== 'avs-app') return;
      if (m.type === 'music-progress') setGenMsg(m.message || '');
      if (m.type === 'music-result') {
        if (m.ok && Array.isArray(m.tracks) && m.tracks.length) {
          setTracks(m.tracks); setGenState('done'); setGenMsg('');
        } else {
          setGenState('error'); setGenMsg(m.message || '생성 실패');
        }
      }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, []);

  const runGenerate = () => {
    if (mode === 'simple' && !description.trim()) { setGenMsg('음악 설명을 입력하세요'); return; }
    if (mode === 'advanced' && !style.trim() && !lyrics.trim()) { setGenMsg('스타일 또는 가사를 입력하세요'); return; }
    setGenState('generating'); setGenMsg('SUNO에서 음악 생성 중… (1~3분 소요)'); setTracks([]);
    window.parent.postMessage(
      { source: 'avs-proposal', type: 'generate-music', mode,
        description: description.trim(), instrumental,
        style: style.trim(), lyrics, title: title.trim() },
      '*'
    );
  };

  return (
    <div className="grid grid-cols-1 lg:grid-cols-2 gap-5">
      {/* 좌측: 입력 */}
      <div className="rounded-2xl border border-[#e2e8f0] bg-white p-5">
        <div className="flex rounded-lg bg-[#f1f5f9] p-0.5 mb-4">
          {[['simple','심플 모드'],['advanced','어드밴스드 모드']].map(([id, lbl]) => (
            <button key={id} onClick={() => setMode(id)}
              className={'flex-1 py-2 rounded-md text-[13px] font-bold transition ' + (mode === id ? 'bg-white text-[#0f172a] shadow-sm' : 'text-[#64748b]')}>
              {lbl}
            </button>
          ))}
        </div>
        {mode === 'simple' ? (
          <div className="space-y-3">
            <label className="block text-[12px] font-bold text-[#64748b]">음악 설명 (프롬프트)</label>
            <textarea value={description} onChange={(e) => setDescription(e.target.value)} rows={7}
              placeholder="예: 신나는 미래적 EDM, 강렬한 신스, 빠른 템포, 영상 BGM용"
              className="w-full rounded-xl border border-[#e2e8f0] p-3 text-sm focus:outline-none focus:border-[#6366f1] resize-none" />
            <label className="flex items-center gap-2 text-[13px] text-[#0f172a] font-medium cursor-pointer">
              <input type="checkbox" checked={instrumental} onChange={(e) => setInstrumental(e.target.checked)} /> 보컬 없음 (악기곡)
            </label>
          </div>
        ) : (
          <div className="space-y-3">
            <div><label className="block text-[12px] font-bold text-[#64748b] mb-1">스타일</label>
              <textarea value={style} onChange={(e) => setStyle(e.target.value)} rows={2}
                placeholder="예: futuristic EDM, energetic, cinematic"
                className="w-full rounded-xl border border-[#e2e8f0] p-3 text-sm focus:outline-none focus:border-[#6366f1] resize-none" /></div>
            <div><label className="block text-[12px] font-bold text-[#64748b] mb-1">가사 (비우면 연주곡)</label>
              <textarea value={lyrics} onChange={(e) => setLyrics(e.target.value)} rows={5}
                placeholder={'[Verse]\\n...'}
                className="w-full rounded-xl border border-[#e2e8f0] p-3 text-sm focus:outline-none focus:border-[#6366f1] resize-none" /></div>
            <div><label className="block text-[12px] font-bold text-[#64748b] mb-1">제목</label>
              <input value={title} onChange={(e) => setTitle(e.target.value)} placeholder="곡 제목"
                className="w-full rounded-xl border border-[#e2e8f0] p-2.5 text-sm focus:outline-none focus:border-[#6366f1]" /></div>
          </div>
        )}
        <button onClick={runGenerate} disabled={genState === 'generating'}
          className="mt-4 w-full py-2.5 rounded-xl bg-[#6366f1] text-white font-bold text-sm hover:bg-[#4f46e5] transition disabled:opacity-50 flex items-center justify-center gap-2">
          <Music className="w-4 h-4" /> {genState === 'generating' ? '생성 중…' : '음악 생성 (2곡)'}
        </button>
        {genMsg && <p className={'mt-2 text-[12px] ' + (genState === 'error' ? 'text-red-500' : 'text-[#64748b]')}>{genMsg}</p>}
        <p className="mt-3 text-[11px] text-[#94a3b8] leading-relaxed">※ SUNO에 로그인되어 있어야 합니다. (이미지 가져오기 → SUNO 열기에서 로그인)</p>
      </div>

      {/* 우측: 결과 2곡 */}
      <div className="rounded-2xl border border-[#e2e8f0] bg-white p-5">
        <div className="text-[12px] font-bold uppercase tracking-wider text-[#64748b] mb-3 flex items-center gap-1.5">
          <Music className="w-3.5 h-3.5" /> 생성된 음악
        </div>
        <div className="space-y-3">
          {[0, 1].map((i) => {
            const t = tracks[i];
            return (
              <div key={i} className="rounded-xl border border-[#e2e8f0] bg-[#f8fafc] p-3">
                {t ? (
                  <div>
                    <div className="text-[13px] font-bold text-[#0f172a] mb-2 truncate">곡 {i + 1}</div>
                    <audio controls src={t.url} className="w-full" />
                  </div>
                ) : genState === 'generating' ? (
                  <div className="flex items-center gap-2 text-[13px] text-[#64748b] py-4">
                    <span className="animate-spin inline-block w-4 h-4 border-2 border-[#cbd5e1] border-t-[#6366f1] rounded-full" /> 곡 {i + 1} 생성 중…
                  </div>
                ) : (
                  <div className="text-[13px] text-[#94a3b8] py-4">곡 {i + 1} — 대기 중</div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

function BoardView({ board, boardIndex, data, onCopy, onUpdateBoard, onUpdatePanel }) {
  const dot = BOARD_DOT[board.label] || '#94a3b8';
  const pacing = board.panels.map(p => p.duration_seconds).join('-');
  const pacingTotal = board.panels.reduce((acc, p) => acc + (p.duration_seconds || 0), 0);
  const pacingValid = pacingTotal === (board.duration_seconds || 10);

  // ── 마스터 프롬프트(전체) — 텍스트박스에 표시 + 생성에 사용 ──
  const [masterPrompt, setMasterPrompt] = useState('');
  useEffect(() => {
    try { setMasterPrompt(serializeBoardToPrompt(board, data)); }
    catch { setMasterPrompt(board.main_frame?.prompt_en || ''); }
  }, [data, board.label]);

  // ── 이미지 생성(ChatGPT) ──
  const [genImg, setGenImg] = useState(null);
  const [genState, setGenState] = useState('idle'); // idle | generating | done | error
  const [genErr, setGenErr] = useState('');
  const [genProgress, setGenProgress] = useState('');
  // ── 영상 생성(Grok, image-to-video) ──
  const [vidPrompt, setVidPrompt] = useState('Please make a video referring to the images for each scene. No bgm');
  const [vidUrl, setVidUrl] = useState(null);
  const [vidState, setVidState] = useState('idle');
  const [vidErr, setVidErr] = useState('');
  const [vidProgress, setVidProgress] = useState('');
  // ── 레퍼런스 이미지(다중, 드래그앤드롭) / 탭 / 영상 설정 ──
  const [refImages, setRefImages] = useState([]);
  const [dragOver, setDragOver] = useState(false);
  const [mediaTab, setMediaTab] = useState('image'); // image | video
  const [imgSource, setImgSource] = useState('chatgpt'); // chatgpt | flow
  const [imgAspect, setImgAspect] = useState((data && data.production && data.production.aspect_ratio) || '16:9');
  const [vidDuration, setVidDuration] = useState('6');   // 6 | 10
  const [vidResolution, setVidResolution] = useState('720p'); // 480p | 720p
  const [vidAspect, setVidAspect] = useState('16:9');
  const addFiles = (files) => {
    [...(files || [])].filter(f => f.type && f.type.startsWith('image/')).forEach(f => {
      const fr = new FileReader();
      fr.onload = () => setRefImages(prev => [...prev, fr.result]);
      fr.readAsDataURL(f);
    });
  };
  const onRefFile = (e) => { addFiles(e.target.files); e.target.value = ''; };
  const onRefDrop = (e) => { e.preventDefault(); setDragOver(false); addFiles(e.dataTransfer.files); };
  const removeRef = (i) => setRefImages(prev => prev.filter((_, idx) => idx !== i));
  // 생성 결과 이미지를 직접 업로드/교체 (기존에 만든 이미지 사용)
  const onGenImgFile = (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) { return; }
    const fr = new FileReader();
    fr.onload = () => { setGenImg(fr.result); setGenState('done'); setGenProgress(''); setGenErr(''); };
    fr.readAsDataURL(f);
    e.target.value = '';
  };

  // 영구 저장: 마운트 시 복원, 변경 시 IndexedDB에 저장 (새로고침해도 유지)
  const [hydrated, setHydrated] = useState(false);
  useEffect(() => {
    let alive = true;
    idbGet('board-' + board.label).then((v) => {
      if (alive && v) {
        if (v.genImg) { setGenImg(v.genImg); setGenState('done'); }
        if (v.vidUrl) { setVidUrl(v.vidUrl); setVidState('done'); }
        if (typeof v.vidPrompt === 'string') setVidPrompt(v.vidPrompt);
        if (Array.isArray(v.refImages)) setRefImages(v.refImages);
      }
      if (alive) setHydrated(true);
    });
    return () => { alive = false; };
  }, [board.label]);
  useEffect(() => {
    if (!hydrated) return;
    idbSet('board-' + board.label, { genImg, vidUrl, vidPrompt, refImages });
  }, [hydrated, genImg, vidUrl, vidPrompt, refImages]);

  useEffect(() => {
    const onMsg = (e) => {
      const m = e.data;
      if (!m || m.source !== 'avs-app' || m.boardLabel !== board.label) return;
      // 이미지
      if (m.type === 'image') { setGenImg(m.dataUrl); setGenState('done'); setGenProgress(''); }
      else if (m.type === 'error') { setGenErr(m.message || '생성 실패'); setGenState('error'); setGenProgress(''); }
      else if (m.type === 'progress') { setGenProgress(m.message || ''); }
      // 영상
      else if (m.type === 'video') { setVidUrl(m.dataUrl); setVidState('done'); setVidProgress(''); }
      else if (m.type === 'video-error') { setVidErr(m.message || '생성 실패'); setVidState('error'); setVidProgress(''); }
      else if (m.type === 'video-progress') { setVidProgress(m.message || ''); }
    };
    window.addEventListener('message', onMsg);
    return () => window.removeEventListener('message', onMsg);
  }, [board.label]);

  const runGenerate = () => {
    const prompt = (masterPrompt || '').trim();
    if (!prompt) { setGenErr('프롬프트가 비어 있습니다'); setGenState('error'); return; }
    setGenState('generating'); setGenErr(''); setGenProgress('시작하는 중…');
    window.parent.postMessage(
      { source: 'avs-proposal', type: 'generate', boardLabel: board.label, prompt, referenceImages: refImages, imgSource, aspect: imgAspect },
      '*'
    );
  };
  const runGenerateVideo = () => {
    if (!genImg) { setVidErr('먼저 이미지를 생성하세요'); setVidState('error'); return; }
    setVidState('generating'); setVidErr(''); setVidProgress('시작하는 중…');
    window.parent.postMessage(
      { source: 'avs-proposal', type: 'generate-video', boardLabel: board.label, prompt: (vidPrompt || '').trim(), image: genImg,
        settings: { duration: vidDuration, resolution: vidResolution, aspect: vidAspect } },
      '*'
    );
  };

  const copyMaster = () => {
    try {
      const prompt = serializeBoardToPrompt(board, data);
      onCopy(prompt);
    } catch (e) {
      onCopy('');
    }
  };

  return (
    <div className="space-y-5">
      {/* Pacing strip */}
      <div className="rounded-2xl border px-4 py-3 flex items-center gap-3 flex-wrap" style={{ background: `${dot}06`, borderColor: `${dot}33` }}>
        <Clock className="w-4 h-4 flex-shrink-0" style={{ color: dot }} />
        <span className="text-[11px] font-black uppercase tracking-wider text-[#64748b]">페이싱</span>
        <span className="text-base font-mono font-bold text-[#0f172a]">{pacing}</span>
        <span className={`text-[11px] font-bold px-2 py-0.5 rounded-full ${pacingValid ? 'bg-white border border-[#e2e8f0] text-[#0f172a]' : 'bg-[#fee2e2] border border-[#fca5a5] text-[#b91c1c]'}`}>
          {pacingTotal}초 / {board.duration_seconds || 10}초{!pacingValid && ' · 합계 불일치'}
        </span>
      </div>

      {/* Main frame + 이미지 생성 (가로 배치) */}
      <div className="flex flex-col lg:flex-row gap-4 items-start">
      <div className="flex-1 min-w-0 rounded-2xl overflow-hidden border border-[#e2e8f0] bg-white shadow-[0_2px_8px_rgba(15,23,42,0.04)]">
        <div className="px-4 py-3 border-b border-[#e2e8f0] flex items-center justify-between gap-3" style={{ background: `${dot}10` }}>
          <div className="flex items-center gap-2.5 min-w-0">
            <span className="text-[12px] font-black px-2 py-0.5 rounded-full" style={{ background: `${dot}25`, color: dot }}>MAIN FRAME</span>
            <span className="text-base font-bold text-[#0f172a] truncate">
              Board {board.label} {board.title_suffix ? `· ${board.title_suffix}` : ''}
            </span>
            <span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-white border border-[#e2e8f0] text-[#334155] flex-shrink-0">
              {board.duration_seconds}초
            </span>
          </div>
        </div>

        <div className="p-4 space-y-3">
          <div>
            <div className="flex items-center justify-between mb-2">
              <div className="flex items-center gap-1.5 min-w-0">
                <Sparkles className="w-3.5 h-3.5 text-[#0E1B45] flex-shrink-0" />
                <span className="text-[11px] uppercase tracking-wider text-[#64748b] font-bold">마스터 프롬프트 (전체)</span>
              </div>
              <button onClick={() => onCopy(masterPrompt)} className="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-white hover:bg-[#f1f5f9] border border-[#e2e8f0] text-[11px] font-bold text-[#64748b] tb-press-soft flex-shrink-0">
                <Copy className="w-3 h-3" />
                복사
              </button>
            </div>
            <textarea
              value={masterPrompt}
              onChange={(e) => setMasterPrompt(e.target.value)}
              rows={18}
              className="w-full min-h-[380px] resize-y bg-white border border-[#e2e8f0] rounded-xl p-2.5 text-[13px] leading-relaxed font-mono text-[#0f172a] focus:outline-none focus:border-[#0E1B45] focus:ring-[3px] focus:ring-[#0E1B45]/20"
            />
          </div>

          {(board.production_notes?.length > 0 || board.moodboard_keywords?.length > 0) && (
            <div className="grid grid-cols-1 md:grid-cols-2 gap-3 pt-1">
              {board.production_notes?.length > 0 && (
                <div className="bg-[#f8fafc] border border-[#e2e8f0] rounded-xl p-3">
                  <div className="text-[10px] font-black text-[#64748b] uppercase tracking-wider mb-1.5">PRODUCTION NOTES</div>
                  <ul className="space-y-1 text-[12.5px] text-[#334155] list-disc pl-4">
                    {board.production_notes.map((n, i) => <li key={i}>{n}</li>)}
                  </ul>
                </div>
              )}
              {board.moodboard_keywords?.length > 0 && (
                <div className="bg-[#fefce8] border border-[#fde68a] rounded-xl p-3">
                  <div className="text-[10px] font-black text-[#a16207] uppercase tracking-wider mb-1.5">MOODBOARD</div>
                  <div className="flex flex-wrap gap-1.5">
                    {board.moodboard_keywords.map((k, i) => (
                      <span key={i} className="text-[11px] px-2 py-0.5 rounded-full bg-white border border-[#fde68a] text-[#a16207] font-bold">{k}</span>
                    ))}
                  </div>
                </div>
              )}
            </div>
          )}
        </div>
      </div>

      {/* 생성 패널 (오른쪽) — 레퍼런스 업로드 + 이미지/영상 탭 */}
      <div className="w-full lg:w-[360px] flex-shrink-0 rounded-2xl border border-[#e2e8f0] bg-white shadow-[0_2px_8px_rgba(15,23,42,0.04)] overflow-hidden self-stretch flex flex-col">
        <div className="p-4 flex flex-col gap-3 flex-1">

          {/* ── 레퍼런스 이미지 (다중, 드래그앤드롭) ── */}
          <div className="flex flex-col gap-2">
            <span className="text-[11px] font-black uppercase tracking-wider text-[#64748b]">레퍼런스 이미지 (선택 · 여러 장)</span>
            <input id={'ref-' + board.label} type="file" accept="image/*" multiple onChange={onRefFile} style={{ display: 'none' }} />
            <div
              onClick={() => document.getElementById('ref-' + board.label).click()}
              onDragOver={(e) => { e.preventDefault(); setDragOver(true); }}
              onDragLeave={() => setDragOver(false)}
              onDrop={onRefDrop}
              className={'w-full rounded-xl border border-dashed p-2 cursor-pointer transition ' + (dragOver ? 'border-[#0E1B45] bg-[#eef2fb]' : 'border-[#cbd5e1] bg-[#f8fafc]')}
            >
              {refImages.length === 0 ? (
                <div className="py-4 text-center text-[12.5px] text-[#64748b] font-bold flex flex-col items-center gap-1.5">
                  <Upload className="w-5 h-5" />
                  이미지를 끌어다 놓거나 클릭해 업로드
                </div>
              ) : (
                <div className="grid grid-cols-3 gap-1.5">
                  {refImages.map((src, i) => (
                    <div key={i} className="relative rounded-lg overflow-hidden border border-[#e2e8f0]" style={{ aspectRatio: '1 / 1' }}>
                      <img src={src} alt={'ref-' + i} className="w-full h-full object-cover" />
                      <button onClick={(e) => { e.stopPropagation(); removeRef(i); }} className="absolute top-0.5 right-0.5 w-5 h-5 rounded-full bg-black/60 text-white text-[11px] flex items-center justify-center">×</button>
                    </div>
                  ))}
                  <div className="flex items-center justify-center rounded-lg border border-dashed border-[#cbd5e1] text-[#94a3b8] text-xl" style={{ aspectRatio: '1 / 1' }}>+</div>
                </div>
              )}
            </div>
            {refImages.length > 0 && <span className="text-[11px] text-[#64748b]">{refImages.length}장 첨부됨</span>}
          </div>

          {/* ── 탭 ── */}
          <div className="flex rounded-lg bg-[#f1f5f9] p-0.5">
            {[['image', ImageIcon, '이미지'], ['video', Film, '영상']].map(([id, Icon, lbl]) => (
              <button key={id} onClick={() => setMediaTab(id)}
                className={'flex-1 py-1.5 rounded-md text-[13px] font-bold transition flex items-center justify-center gap-1.5 ' + (mediaTab === id ? 'bg-white text-[#0f172a] shadow-sm' : 'text-[#64748b]')}>
                <Icon className="w-4 h-4" /> {lbl}
              </button>
            ))}
          </div>

          {/* ── 이미지 탭 ── */}
          {mediaTab === 'image' && (
            <div className="flex flex-col gap-2.5">
              <input id={'genimg-' + board.label} type="file" accept="image/*" onChange={onGenImgFile} style={{ display: 'none' }} />
              <div
                onClick={() => genState !== 'generating' && document.getElementById('genimg-' + board.label).click()}
                title="클릭하여 이미지 업로드·교체"
                className="group relative w-full rounded-xl border border-[#e2e8f0] bg-[#f8fafc] overflow-hidden flex items-center justify-center cursor-pointer"
                style={{ aspectRatio: '16 / 9' }}
              >
                {genImg ? (
                  <img src={genImg} alt="생성된 이미지" className="w-full h-full object-cover" />
                ) : (
                  <div className="text-center px-4">
                    {genState === 'generating'
                      ? <span className="text-[13px] text-[#64748b]"><span className="inline-block animate-pulse">● </span>{genProgress || '생성 중…'}</span>
                      : <span className="text-[13px] text-[#94a3b8]">마스터 프롬프트로 생성하거나<br/>클릭해서 이미지를 업로드하세요</span>}
                  </div>
                )}
                {genState !== 'generating' && (
                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/40 transition flex items-center justify-center opacity-0 group-hover:opacity-100">
                    <span className="flex items-center gap-1.5 text-white text-[12.5px] font-bold"><Upload className="w-4 h-4" /> 업로드 · 교체</span>
                  </div>
                )}
              </div>
              <div className="flex items-center gap-2">
                <div className="flex flex-1 rounded-lg bg-[#f1f5f9] p-0.5">
                  {[['chatgpt','ChatGPT'],['flow','Flow']].map(([id, lbl]) => (
                    <button key={id} onClick={() => setImgSource(id)}
                      className={'flex-1 py-1.5 rounded-md text-[12px] font-bold transition ' + (imgSource === id ? 'bg-white text-[#0f172a] shadow-sm' : 'text-[#64748b]')}>
                      {lbl}
                    </button>
                  ))}
                </div>
                <select value={imgAspect} onChange={(e) => setImgAspect(e.target.value)}
                  className="text-[12px] rounded-md border border-[#e2e8f0] bg-white px-2 py-1.5 text-[#0f172a] focus:outline-none">
                  {['16:9','9:16','1:1','4:3','3:4'].map(r => <option key={r} value={r}>{r}</option>)}
                </select>
              </div>
              <button onClick={runGenerate} disabled={genState === 'generating'}
                className="w-full flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg tb-pill-primary text-sm font-bold transition disabled:opacity-50">
                <Sparkles className="w-4 h-4" />
                {genState === 'generating' ? '생성 중…' : genImg ? '다시 생성' : (imgSource === 'flow' ? 'Flow로 생성' : '이미지 생성')}
              </button>
              {refImages.length > 0 && <p className="text-[11px] text-[#64748b] text-center">레퍼런스 {refImages.length}장을 첨부해 생성합니다</p>}
              {genState === 'done' && <p className="text-[12px] text-[#16a34a] font-bold text-center">✓ 이미지가 도착했습니다</p>}
              {genState === 'error' && <p className="text-[12px] text-[#dc2626] text-center">{genErr || '생성 실패'}</p>}
            </div>
          )}

          {/* ── 영상 탭 ── */}
          {mediaTab === 'video' && (
            <div className="flex flex-col gap-2.5">
              {vidUrl ? (
                <video src={vidUrl} controls className="w-full rounded-xl border border-[#e2e8f0] bg-black" style={{ aspectRatio: '16 / 9' }} />
              ) : vidState === 'generating' ? (
                <div className="w-full rounded-xl border border-[#e2e8f0] bg-[#f8fafc] flex items-center justify-center text-center px-4" style={{ aspectRatio: '16 / 9' }}>
                  <span className="text-[13px] text-[#64748b]"><span className="inline-block animate-pulse">● </span>{vidProgress || '생성 중…'}</span>
                </div>
              ) : (
                <div className="w-full rounded-xl border border-[#e2e8f0] bg-[#f8fafc] flex items-center justify-center text-center px-4 text-[13px] text-[#94a3b8]" style={{ aspectRatio: '16 / 9' }}>
                  생성한 이미지를 Grok으로<br/>영상으로 만듭니다
                </div>
              )}

              {/* Grok 설정값 */}
              <div className="grid grid-cols-3 gap-2">
                {[['길이', vidDuration, setVidDuration, [['6','6초'],['10','10초']]],
                  ['화질', vidResolution, setVidResolution, [['480p','480p'],['480p-upscale','480p↑업스케일'],['720p','720p']]],
                  ['비율', vidAspect, setVidAspect, [['16:9','16:9'],['9:16','9:16'],['1:1','1:1']]]].map(([label, val, setter, opts]) => (
                  <div key={label} className="flex flex-col gap-1">
                    <span className="text-[10px] font-bold text-[#94a3b8] uppercase">{label}</span>
                    <select value={val} onChange={(e) => setter(e.target.value)}
                      className="w-full text-[12px] rounded-md border border-[#e2e8f0] bg-white px-1.5 py-1.5 text-[#0f172a] focus:outline-none">
                      {opts.map(([v, l]) => <option key={v} value={v}>{l}</option>)}
                    </select>
                  </div>
                ))}
              </div>

              <textarea value={vidPrompt} onChange={(e) => setVidPrompt(e.target.value)} rows={2}
                placeholder="영상 프롬프트 (예: 보드가 천천히 떠오르며 블루 에너지 링이 회전, 카메라 서서히 전진)"
                className="w-full resize-y bg-white border border-[#e2e8f0] rounded-xl p-2.5 text-[12.5px] leading-relaxed text-[#0f172a] focus:outline-none focus:border-[#0E1B45] focus:ring-[3px] focus:ring-[#0E1B45]/20" />
              <button onClick={runGenerateVideo} disabled={vidState === 'generating' || !genImg}
                className="w-full flex items-center justify-center gap-1.5 px-4 py-2.5 rounded-lg text-sm font-bold transition disabled:opacity-50 text-white"
                style={{ background: genImg ? '#0E1B45' : '#94a3b8' }}>
                <Clapperboard className="w-4 h-4" />
                {vidState === 'generating' ? '생성 중…' : vidUrl ? '다시 생성' : '비디오 생성'}
              </button>
              {!genImg && <p className="text-[11px] text-[#94a3b8] text-center">먼저 이미지 탭에서 이미지를 생성하세요</p>}
              {vidState === 'done' && <p className="text-[12px] text-[#16a34a] font-bold text-center">✓ 영상이 도착했습니다</p>}
              {vidState === 'error' && <p className="text-[12px] text-[#dc2626] text-center">{vidErr || '생성 실패'}</p>}
            </div>
          )}

          <p className="text-[11px] text-[#94a3b8] leading-snug text-center mt-auto pt-1">ChatGPT·Grok에 로그인되어 있어야 하며, 생성에는 시간이 걸립니다.</p>
        </div>
      </div>

      </div>{/* /가로 배치 */}

      {/* Panels — 앱 임베드: P01 이하 패널 카드 숨김(메인 프레임만 표시) */}
      {false && board.panels.map((panel, panelIdx) => (
        <PanelCard
          key={`${board.label}-${panel.number}`}
          panel={panel}
          boardDot={dot}
          onCopy={onCopy}
          onUpdate={(patch) => onUpdatePanel(panelIdx, patch)}
        />
      ))}
    </div>
  );
}

function PanelCard({ panel, boardDot, onCopy, onUpdate }) {
  const labels = panel.labels || {};
  const fnLabel = panel.function ? (FUNCTION_LABEL[panel.function] || panel.function) : '';

  return (
    <div className="rounded-2xl overflow-hidden border border-[#e2e8f0] bg-white shadow-[0_2px_8px_rgba(15,23,42,0.04)]">
      <div className="px-4 py-3 border-b border-[#e2e8f0] flex items-center justify-between gap-3 flex-wrap" style={{ background: `${boardDot}08` }}>
        <div className="flex items-center gap-2.5 min-w-0">
          <span className="text-[12px] font-black px-2 py-0.5 rounded-full" style={{ background: `${boardDot}25`, color: boardDot }}>
            P{String(panel.number).padStart(2, '0')}
          </span>
          {panel.timecode && <span className="text-[12px] font-mono font-bold text-[#334155]">{panel.timecode}</span>}
          {panel.duration_seconds > 0 && (
            <span className="flex items-center gap-1 text-[11px] font-bold px-2 py-0.5 rounded-full bg-white border border-[#e2e8f0] text-[#334155]">
              <Clock className="w-3 h-3" />
              {panel.duration_seconds}초
            </span>
          )}
          {fnLabel && (
            <span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-white border border-[#e2e8f0] text-[#334155]">{fnLabel}</span>
          )}
          {panel.is_bridge && (
            <span className="text-[11px] font-bold px-2 py-0.5 rounded-full bg-[#ecfeff] border border-[#a5f3fc] text-[#0891b2]">BRIDGE</span>
          )}
        </div>
      </div>

      <div className="p-4 space-y-3">
        {/* Image prompt */}
        <div>
          <div className="flex items-center justify-between mb-2">
            <div className="flex items-center gap-1.5 min-w-0">
              <ImageIcon className="w-3.5 h-3.5 text-[#0E1B45] flex-shrink-0" />
              <span className="text-[11px] uppercase tracking-wider text-[#64748b] font-bold">이미지 프롬프트 (15–30 words, EN)</span>
            </div>
            <button onClick={() => onCopy(panel.image_prompt_en)} className="flex items-center gap-1 px-2.5 py-1 rounded-lg bg-white hover:bg-[#f1f5f9] border border-[#e2e8f0] text-[11px] font-bold text-[#64748b] tb-press-soft flex-shrink-0">
              <Copy className="w-3 h-3" />
              복사
            </button>
          </div>
          <textarea
            value={panel.image_prompt_en}
            onChange={(e) => onUpdate({ image_prompt_en: e.target.value })}
            rows={3}
            className="w-full min-h-[80px] resize-y bg-white border border-[#e2e8f0] rounded-xl p-2.5 text-[13px] leading-relaxed font-mono text-[#0f172a] focus:outline-none focus:border-[#0E1B45] focus:ring-[3px] focus:ring-[#0E1B45]/20"
          />
        </div>

        {/* 4 Labels */}
        <div className="grid grid-cols-1 md:grid-cols-2 gap-2">
          <LabelField icon={Sparkles} label="ACTION / VISUAL" value={labels.action_visual}
            onChange={(v) => onUpdate({ labels: { ...labels, action_visual: v } })} onCopy={() => onCopy(labels.action_visual || '')} />
          <LabelField icon={Camera} label="CAMERA / MOVEMENT" value={labels.camera_movement}
            onChange={(v) => onUpdate({ labels: { ...labels, camera_movement: v } })} onCopy={() => onCopy(labels.camera_movement || '')} />
          <LabelField icon={MessageSquare} label="SOUND / DIALOGUE (music & SFX)" value={labels.sound_dialogue}
            onChange={(v) => onUpdate({ labels: { ...labels, sound_dialogue: v } })} onCopy={() => onCopy(labels.sound_dialogue || '')} />
          <LabelField icon={Layers} label="TRANSITION" value={labels.transition}
            onChange={(v) => onUpdate({ labels: { ...labels, transition: v } })} onCopy={() => onCopy(labels.transition || '')} />
        </div>
      </div>
    </div>
  );
}

function LabelField({ icon: Icon, label, value, onChange, onCopy }) {
  return (
    <div className="bg-[#f8fafc] border border-[#e2e8f0] rounded-xl p-2.5 min-w-0">
      <div className="flex items-center justify-between mb-1">
        <div className="flex items-center gap-1.5 min-w-0">
          <Icon className="w-3 h-3 text-[#94a3b8] flex-shrink-0" />
          <span className="text-[10px] font-black text-[#64748b] uppercase tracking-wider truncate">{label}</span>
        </div>
        <button onClick={onCopy} className="flex items-center gap-0.5 px-1.5 py-0.5 rounded-lg bg-white hover:bg-[#f1f5f9] border border-[#e2e8f0] text-[10px] font-bold text-[#94a3b8] tb-press-soft flex-shrink-0">
          <Copy className="w-2.5 h-2.5" />
        </button>
      </div>
      <textarea
        value={value || ''}
        onChange={(e) => onChange(e.target.value)}
        rows={2}
        className="w-full min-h-[40px] resize-y bg-white border border-[#e2e8f0] rounded-lg p-2 text-[12px] leading-snug text-[#0f172a] focus:outline-none focus:border-[#0E1B45] focus:ring-[2px] focus:ring-[#0E1B45]/20"
      />
    </div>
  );
}

function LockRow({ k, v, onCopy }) {
  return (
    <div className="flex items-start gap-2">
      <span className="text-[10px] font-black text-[#94a3b8] uppercase tracking-wider w-20 pt-0.5 flex-shrink-0">{k}</span>
      <span className="flex-1 text-[#0f172a] break-words">{v}</span>
      <button onClick={onCopy} className="flex items-center gap-0.5 px-1.5 py-0.5 rounded-lg bg-white hover:bg-[#f1f5f9] border border-[#e2e8f0] text-[10px] font-bold text-[#94a3b8] tb-press-soft flex-shrink-0">
        <Copy className="w-2.5 h-2.5" />
      </button>
    </div>
  );
}

function Stat({ k, v }) {
  return (
    <div className="flex items-start gap-2 min-w-0">
      <span className="text-[10px] font-black text-[#94a3b8] uppercase tracking-wider w-20 pt-0.5 flex-shrink-0">{k}</span>
      <span className="flex-1 text-[#334155] break-words">{v}</span>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
